<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>만화 일정 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght400;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'Noto Sans KR',sans-serif;background:#000;color:#fff;display:flex;justify-content:flex-start;align-items:center;min-height:100vh;padding:16px;flex-direction:column;gap:0}
    .tab-content{display:none}.tab-content.active{display:flex;flex-direction:column;flex-grow:1}
    .section-card{background:#2a2a2a;border-radius:12px;padding:20px;box-shadow:inset 0 0 10px rgba(0,0,0,.3);text-align:center;width:100%;max-width:800px}
    .notepad-tabs{display:flex;justify-content:center;align-items:center;gap:1rem;width:100%;max-width:800px}
    .notepad-tab{background:#1a1a1a;padding:8px 16px;border-radius:8px 8px 0 0;cursor:pointer;transition:.2s;font-weight:700;color:#737373;font-size:.85rem}
    .notepad-tab.active,.notepad-tab:hover{background:#2a2a2a;color:#fff}

    /* ===== 메모(내부) 탭 전용 스타일: 메인 탭(.notepad-tab)과 분리 ===== */
/* 메모 공간과 분리된 '둥근 네모' 탭 */
#notesHeaderRow{margin-top:8px;margin-bottom:8px}
#notesTabsContainer{
  justify-content:flex-start;
  align-items:center;
  gap:8px;
  padding-left:10px;
  margin-top:0;
}

.notes-tab{
  background:#3a3a3a;
  padding:8px 16px;
  border-radius:12px;
  cursor:pointer;
  transition:background .2s,color .2s,transform .15s ease;
  font-weight:700;
  color:#ddd;
  font-size:.85rem;
  position:relative;
  z-index:1;
  border:1px solid transparent;
}
.notes-tab:hover{background:#4a4a4a}
.notes-tab.active{
  background:#111;
  color:#fff;
  border-color:#2a2a2a;
  z-index:2;
}

.notes-tab.dragging{opacity:.3}
.notes-tab.placeholder{opacity:1}

/* 메모 입력 영역은 탭과 분리되게 약간 간격 */
#notesArea{margin-top:10px}

.notes-tab .tab-del{margin-left:8px;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:999px;background:#555;color:#fff;font-size:12px;line-height:1}


/* 북마크 탭도 메모 탭과 동일한 둥근 네모 스타일 */
#bookmarkHeaderRow{margin-top:8px;margin-bottom:8px}
#bookmarkTabsContainer{
  justify-content:flex-start;
  align-items:center;
  gap:8px;
  padding-left:10px;
  margin-top:0;
}
.bookmark-tab{
  background:#3a3a3a;
  padding:8px 16px;
  border-radius:12px;
  cursor:pointer;
  transition:background .2s,color .2s,transform .15s ease;
  font-weight:700;
  color:#ddd;
  font-size:.85rem;
  position:relative;
  z-index:1;
  border:1px solid transparent;
}
.bookmark-tab:hover{background:#4a4a4a}
.bookmark-tab.active{
  background:#111;
  color:#fff;
  border-color:#2a2a2a;
  z-index:2;
}
.bookmark-tab.dragging{opacity:.3}
.bookmark-tab.placeholder{opacity:1}
.bookmark-tab .tab-del{margin-left:8px;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:999px;background:#555;color:#fff;font-size:12px;line-height:1}



/* 노동요 내부 탭: 북마크 탭과 동일한 둥근 네모 스타일 */
#workmusicHeaderRow{margin-top:8px;margin-bottom:8px}
#workmusicTabsContainer{
  justify-content:flex-start;
  align-items:center;
  gap:8px;
  padding-left:10px;
  margin-top:0;
}
.workmusic-tab{
  background:#3a3a3a;
  padding:8px 16px;
  border-radius:12px;
  cursor:pointer;
  transition:background .2s,color .2s,transform .15s ease;
  font-weight:700;
  color:#ddd;
  font-size:.85rem;
  position:relative;
  z-index:1;
  border:1px solid transparent;
}
.workmusic-tab:hover{background:#4a4a4a}
.workmusic-tab.active{background:#111;color:#fff;border-color:#2a2a2a;z-index:2}
.workmusic-tab.dragging{opacity:.3}
.workmusic-tab.placeholder{opacity:1}
.workmusic-tab .tab-del{margin-left:8px;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:999px;background:#555;color:#fff;font-size:12px;line-height:1}
.workmusic-tab .playlist-mark{display:inline-flex;align-items:center;justify-content:center;margin-right:6px;opacity:.85;vertical-align:-2px}
.workmusic-tab .playlist-mark svg{width:14px;height:14px;display:block}

/* 이미지 모달 상단 아이콘 컨트롤 */
#imageModalControls{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:8px;
  z-index:60;
  padding:6px;
  border-radius:999px;
  background:rgba(0,0,0,.46);
  backdrop-filter:blur(8px);
}
.image-modal-icon-btn{
  width:38px;
  height:38px;
  border-radius:999px;
  border:none;
  background:rgba(255,255,255,.12);
  color:#fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:background .2s,transform .15s ease;
}
.image-modal-icon-btn:hover{background:rgba(255,255,255,.22);transform:scale(1.04)}
.image-modal-icon-btn svg{width:20px;height:20px;display:block}
#moveBookmarkTabSelect{
  position:absolute;
  top:54px;
  left:0;
  min-width:140px;
  max-width:220px;
  background:#1f1f1f;
  color:#fff;
  border:1px solid #555;
  border-radius:10px;
  padding:8px 10px;
  display:none;
}
#imageModalControls.move-open #moveBookmarkTabSelect{display:block}

/* 아이콘 버튼 (메모 + / 편집) */

    .icon-btn{background:transparent;border:none;padding:6px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer}
    .icon-btn:hover{background:rgba(255,255,255,.08)}
    .icon-btn svg{width:18px;height:18px;display:block}
    .notes-area{flex-grow:1;resize:vertical}
    textarea#notesArea::-webkit-scrollbar{width:8px;background-color:#2a2a2a;border-radius:10px}
    textarea#notesArea::-webkit-scrollbar-thumb{background-color:#555;border-radius:10px}
    .calendar-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .day-label,.calendar-day{text-align:center;padding:8px 2px;border-radius:8px;background:#2a2a2a;position:relative;overflow:hidden;word-wrap:break-word}
    .day-label{background:#444;font-weight:700;color:#fff;font-size:.8rem;padding:8px 0}
    .calendar-day{min-height:160px;padding:8px 6px 4px;display:flex;flex-direction:column;gap:2px;border:1px solid #444;box-sizing:border-box;cursor:pointer}
    .calendar-day:hover{border-color:#666;background:#303030}
    .calendar-day.today{border:2px solid #f5f5f5;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
    .day-top{display:flex;align-items:center;gap:4px;width:100%;min-height:28px}
    .day-number{font-size:.85rem;font-weight:700;color:#aaa;z-index:10;line-height:1;min-width:18px;text-align:left;cursor:pointer}
    .day-divider{height:1px;background:#3a3a3a;margin:2px 0 2px;border-radius:999px;opacity:.95}
    .calendar-month-counts{display:inline-flex;align-items:center;gap:6px;margin-left:10px;vertical-align:middle;font-size:.78rem;color:#d1d5db}
    .calendar-count-badge{display:inline-flex;align-items:center;gap:3px;background:#3a3a3a;border-radius:999px;padding:3px 8px;font-weight:700;line-height:1}
    .calendar-count-badge.shorts{color:#c4b5fd}.calendar-count-badge.webtoon{color:#fcd34d}
    .task-item{font-size:.85rem;padding:5px 6px;border-radius:8px;margin-top:4px;word-wrap:break-word;cursor:pointer;text-align:left}
    .task-item.custom-task{background:#4c78a8}
    .task-item.custom-task.custom-important{background:#dc2626;color:#fff}
    .task-item.custom-task.custom-family{background:#2563eb;color:#fff}
    .task-item.custom-task.custom-special{background:#16a34a;color:#fff}
    .task-item.episode-task{background:#444;color:#ddd}
    /* 완료(complete) 공통 */
    .task-item.complete{background:#888;text-decoration:line-through;color:#ccc}
    /* 커스텀(개인작업) 완료 시: 카테고리 색상보다 우선해서 회색 처리 */
    .task-item.custom-task.complete{background:#666 !important;color:#bdbdbd !important;text-decoration:line-through;opacity:.95}
    .add-task-btn{background:#666;transition:.2s}.add-task-btn:hover{background:#777;transform:scale(1.02)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:1000}
    .modal-content{background:#1a1a1a;border-radius:12px;padding:24px;width:90%;max-width:500px;box-shadow:0 10px 30px rgba(0,0,0,.5);position:relative}
    .drag-area{border:2px dashed #4b4b4b;transition:all .3s ease;padding:24px}
    .drag-area.active{border-color:#6b6b6b;background-color:#2a2a2a}
    .drag-over{border-color:#6b6b6b;background-color:#2a2a2a}
    
    /* 일일 체크 버튼 그룹 (쇼츠/웹툰) 스타일 */
    .daily-check-group {
        display: flex;
        width: auto;
        flex: 1;
        gap: 2px;
        margin-top: 0;
        min-width: 0;
    }
    .daily-check-btn {
        flex: 1;
        text-align: center;
        font-size: 0.68rem;
        padding: 3px 0;
        border-radius: 5px;
        background: #444; /* 기본 회색 */
        color: #ccc;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
        font-weight: 500;
    }
    .daily-check-btn:hover {
        opacity: 0.9;
    }
    /* 쇼츠 활성 상태: 빨강 */
    .daily-check-btn.shorts.active {
        background: #7c3aed; 
        color: white;
        font-weight: 700;
    }
    /* 웹툰 활성 상태: 노랑 */
    .daily-check-btn.webtoon.active {
        background: #f59e0b;
        color: white;
        font-weight: 700;
    }

    /* 달력 아래 일정 & 할 일 리스트 */
    .agenda-item{display:flex;align-items:center;gap:10px;background:#2a2a2a;border-radius:10px;padding:10px 10px}
    .agenda-dot{width:10px;height:10px;border-radius:999px;flex:0 0 10px}
    .agenda-date{font-size:.8rem;color:#bbb;min-width:92px}
    .agenda-text{flex:1 1 auto;word-break:break-word}
    .agenda-actions{display:flex;gap:6px;flex:0 0 auto}
    .agenda-btn{background:#3a3a3a;border-radius:10px;padding:6px 8px;font-size:.8rem;color:#fff;cursor:pointer;user-select:none}
    .agenda-btn:hover{background:#4a4a4a}
    .agenda-section-title{margin-top:10px;margin-bottom:6px;color:#ddd;font-weight:700;font-size:.9rem;opacity:.95}
    .agenda-settings-btn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:30px;background:#3a3a3a;border-radius:10px;color:#fff;border:none;cursor:pointer;user-select:none}
    .agenda-settings-btn:hover{background:#4a4a4a}


    
    /* 완료된 할일(리스트): 원래처럼 '회색 + 취소선'이 확실히 보이도록 강제 */
    .agenda-item.complete{opacity:.9;background:#242424}
    .agenda-item.complete .agenda-text{color:#7a7a7a !important;text-decoration:line-through}
    .agenda-item.complete .agenda-date{color:#6b7280 !important}
/* 북마크 Masonry 레이아웃 */
    #image-grid {
        column-count: 2; /* 기본 2열 */
        column-gap: 1rem;
        margin-top: 1.5rem; /* mt-6 */
        display: block;
    }
    @media (min-width: 640px) { /* sm: 3열 */
        #image-grid { column-count: 3; }
    }
    @media (min-width: 1024px) { /* lg: 4열 */
        #image-grid { column-count: 4; }
    }

    /* 북마크 카드 스타일 */
    .bookmark-card{
        position: relative;
        transition: transform .2s ease-in-out; 
        background: #333; 
        border-radius: 8px; 
        overflow: hidden; 
        margin-bottom: 1rem; /* 세로 간격 */
        break-inside: avoid; /* 카드 분할 방지 */
        width: 100%; /* Column 아이템으로 사용 */
        display: block;
    }
    .bookmark-card:hover{transform:translateY(-5px)}
    
    /* 콘텐츠 영역: 이미지/아이콘 높이에 따라 크기 결정 */
    .bookmark-card .content {
        display: block; 
        width: 100%;
        height: auto;
        overflow: hidden;
        background-color: #1a1a1a;
        /* 링크나 동영상 썸네일이 없을 때 최소 높이 보장 */
        min-height: 80px; 
        position: relative; /* 오버레이를 위한 기준점 */
    }
    
    .bookmark-card img {
        position: static; 
        width: 100%;
        height: auto; /* 실제 비율 사용 */
        display: block;
        /* 기본: 이미지가 잘리지 않고 전체가 보이도록 contain 설정 */
        object-fit: contain; 
    }

    .bookmark-card .img-fit-cover {
        /* 비디오 썸네일용: 영역을 꽉 채우도록 cover 설정 */
        object-fit: cover; 
        height: 100%; /* content의 높이를 꽉 채우도록 설정 */
    }
    
    /* 아이콘/텍스트 오버레이 */
    .bookmark-card .icon-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex; justify-content: center; align-items: center;
        color: white; font-size: 3rem;
    }
    /* 링크 북마크의 제목 표시 */
    .bookmark-card .link-title-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; padding: 10px;
        text-align: center;
    }
    .bookmark-card .link-title-text {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 5px;
        word-break: break-all;
    }
    .bookmark-card .link-url-text {
        font-size: 0.75rem;
        opacity: 0.7;
        word-break: break-all;
    }
    
    /* 신규 Video title overlay (썸네일 없을 때) */
    .bookmark-card .video-title-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(80, 0, 0, 0.7); /* Reddish background for video emphasis */
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; padding: 10px;
        text-align: center;
    }
    .bookmark-card .video-title-text {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 5px;
        word-break: break-all;
    }
    .bookmark-card .video-url-text {
        font-size: 0.75rem;
        opacity: 0.7;
        word-break: break-all;
    }
    
    /* 인스타그램 스타일 (이제 직접 임베드 코드를 사용하므로 이 스타일은 사용하지 않음) */
    .bookmark-card .instagram-overlay { display: none; } 
    
    /* 인스타그램 임베드 짤림 방지: 임베드 콘텐츠가 부모 카드 너비를 넘지 않도록 설정 */
    .bookmark-card .content > div[style*="max-width:540px"] {
        max-width: 100% !important; 
        width: 100% !important;
        box-sizing: border-box; /* 패딩/보더 포함 너비 계산 */
    }

    /* 사이트별 구분 헤더 스타일 */
    .domain-header {
        column-span: all; /* Masonry 레이아웃에서 전체 너비를 차지 */
        width: 100%;
        margin: 20px 0 10px;
        padding: 8px 0;
        color: #fff;
        font-size: 1.25rem;
        font-weight: 700;
        border-bottom: 2px solid #555;
        text-align: left;
    }


/* 노동요 플레이어 */
.workmusic-panel{display:flex;flex-direction:column;gap:14px}
#workmusic-drag-area{min-height:110px}
.workmusic-player-wrap{background:#111;border-radius:12px;overflow:hidden;border:1px solid #444}
#workMusicPlayerBox{width:100%;aspect-ratio:16/9;background:#000;display:flex;align-items:center;justify-content:center;color:#777;font-size:.9rem}
#workMusicPlayerBox iframe{width:100%;height:100%;display:block;border:0}
.workmusic-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center}
.workmusic-icon-btn{width:42px;height:42px;border-radius:999px;background:#2f2f2f;color:#eee;border:1px solid #444;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,transform .15s,border-color .2s,color .2s}
.workmusic-icon-btn:hover{background:#3a3a3a;border-color:#555;transform:scale(1.04)}
.workmusic-icon-btn svg{width:22px;height:22px;display:block}
#workMusicModeBtn{color:#777}
#workMusicModeBtn.random{color:#fff}
.workmusic-volume{display:flex;align-items:center;gap:8px;background:#2f2f2f;border:1px solid #444;border-radius:999px;padding:7px 12px}
.workmusic-volume-btn{width:24px;height:24px;border:0;background:transparent;color:#ddd;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0;border-radius:999px;flex:0 0 auto}
.workmusic-volume-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.workmusic-volume-btn svg{width:20px;height:20px;display:block}
#workMusicVolumeRange{width:120px;accent-color:#fff;cursor:pointer}
.workmusic-volume-percent{min-width:38px;text-align:right;font-size:.78rem;font-weight:800;color:#e5e5e5;line-height:1;font-variant-numeric:tabular-nums}
.workmusic-list{column-count:2;column-gap:1rem;margin-top:.5rem;display:block;text-align:left}
@media (min-width:640px){.workmusic-list{column-count:3}}
@media (min-width:1024px){.workmusic-list{column-count:4}}
.workmusic-list.music-compact-list{column-count:1;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:.5rem}
.workmusic-list.music-compact-list .workmusic-item{margin-bottom:0}
@media (max-width:640px){.workmusic-list.music-compact-list{grid-template-columns:1fr}}
.workmusic-item{position:relative;background:#2f2f2f;border:1px solid #3f3f3f;border-radius:8px;overflow:hidden;margin-bottom:1rem;break-inside:avoid;width:100%;display:block;cursor:pointer;transition:transform .2s ease-in-out,border-color .2s,background .2s}
.workmusic-item:hover{transform:translateY(-5px);background:#363636}
.workmusic-item.active{border-color:#d4d4d4;background:#3a3a3a}
.workmusic-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:#000;display:block}
.workmusic-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.12);opacity:.9;pointer-events:none}
.workmusic-play-overlay svg{width:46px;height:46px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.workmusic-title-overlay{position:absolute;left:0;right:0;bottom:0;z-index:4;background:linear-gradient(to top,rgba(0,0,0,.82),rgba(0,0,0,.35),rgba(0,0,0,0));color:#fff;font-size:.78rem;font-weight:700;line-height:1.25;padding:28px 62px 8px 10px;text-shadow:0 1px 3px rgba(0,0,0,.8);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.workmusic-duration-badge{position:absolute;right:8px;bottom:8px;z-index:6;background:rgba(0,0,0,.82);color:#fff;border-radius:4px;padding:2px 5px;font-size:.72rem;font-weight:800;line-height:1;letter-spacing:.01em}
/* 유튜브뮤직에서 불러온 곡은 작은 앨범형 카드로 표시 */
.workmusic-item.music-track{display:flex;align-items:center;min-height:74px;padding:8px 44px 8px 8px;background:#303030;border-color:#444}
.workmusic-item.music-track:hover{background:#383838}
.workmusic-item.music-track .workmusic-thumb{width:58px;height:58px;aspect-ratio:auto;border-radius:6px;object-fit:cover;flex:0 0 58px}
.workmusic-item.music-track .workmusic-music-info{min-width:0;flex:1 1 auto;padding-left:10px;padding-right:4px}

    function countWeekdaysBetweenKST(a,b){ let c=0,start=toKST(new Date(Math.min(a,b))),end=toKST(new Date(Math.max(a,b))),cur=new Date(start); while(cur<=end){ const d=cur.getDay(); if(d>=1&&d<=5)c++; cur.setDate(cur.getDate()+1);} return c;}
    // ===== Episode calculator: episodes increase on weekdays (Mon~Fri) =====
    // 기준: 2026-02-02(월) = 2123화 (주말은 회차 진행 없음)
    function isEpisodeDay(dateObj){
      const dow = dateObj.getDay(); // 0=Sun ... 6=Sat
      return dow >= 1 && dow <= 5;  // Mon~Fri
    }

    function countEpisodeDaysExclusiveStartInclusiveEnd(startDateObj, endDateObj){
      // counts eligible days in (start, end] assuming start < end
      let count = 0;
      const cur = new Date(startDateObj.getFullYear(), startDateObj.getMonth(), startDateObj.getDate());
      const end = new Date(endDateObj.getFullYear(), endDateObj.getMonth(), endDateObj.getDate());
      cur.setDate(cur.getDate() + 1);
      while(cur <= end){
        if(isEpisodeDay(cur)) count++;
        cur.setDate(cur.getDate() + 1);
      }
      return count;
    }

    function episodeNumberForDate(targetDateObj){

      if(t.getTime() === baseDate.getTime()) return baseEpisode;

      if(t > baseDate){
        const n = countEpisodeDaysExclusiveStartInclusiveEnd(baseDate, t);
        return baseEpisode + n;
      } else {
        const n = countEpisodeDaysExclusiveStartInclusiveEnd(t, baseDate);
        return baseEpisode - n;
      }
    }

      const nextMonthBtn=document.getElementById('nextMonthBtn');
      prevMonthBtn?.addEventListener('click',()=>{ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); });
      nextMonthBtn?.addEventListener('click',()=>{ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); });
      // 상단/하단의 "+추가" 버튼은 제거됨. (날짜 클릭/설정 버튼으로 추가/편집)

      // "달력에는 표시하지 않고 할 일로만" 토글
      todoOnlyCheckbox?.addEventListener('change',()=>{
        const on = !!todoOnlyCheckbox.checked;
        if(taskDateInput){
          taskDateInput.disabled = on;
          if(on) taskDateInput.value = '';
        }
      });
      if(notesArea){
        notesArea.addEventListener('input',()=>window.cloudSaveNotesDebounced&&window.cloudSaveNotesDebounced());
        notesArea.addEventListener('blur',()=>window.cloudSaveNotes&&window.cloudSaveNotes());
      }
      cancelBtn.addEventListener('click',closeModal);
      saveTaskBtn.addEventListener('click',saveTask);
      // window.deleteTask는 Google Drive 저장 레이어에서 정의됨
      deleteTaskBtn.addEventListener('click',()=>window.deleteTask&&window.deleteTask());
      taskModal.addEventListener('click',(e)=>{ if(e.target===taskModal) closeModal(); });

      closeImageModalBtn.addEventListener('click', closeImageModal);
      // 이미지 모달 배경 클릭 시 닫기
      imageModal.addEventListener('click',(e)=>{ if(e.target===imageModal) closeImageModal(); }); 
      // 추가: 모달 내용 (이미지 포함) 클릭 시 닫기
      document.querySelector('#imageModal .modal-content').addEventListener('click', (e) => {
          // X 버튼, 원본 페이지 이동 버튼을 제외하고 닫기
          if (!e.target.closest('#imageModalControls')) {
              closeImageModal();
          }
      });
      
      moveBookmarkTabBtn?.addEventListener('click', (e)=>{
        e.stopPropagation();
        if(!currentModalBookmark || !moveBookmarkTabSelect) return;
        document.getElementById('imageModalControls')?.classList.toggle('move-open');
      });
      moveBookmarkTabSelect?.addEventListener('click', (e)=>e.stopPropagation());
      moveBookmarkTabSelect?.addEventListener('change', async (e)=>{
        e.stopPropagation();
        if(!currentModalBookmark || !moveBookmarkTabSelect) return;
        const nextTabId = moveBookmarkTabSelect.value || 'default';
        if(window.moveBookmarkToTab){
          await window.moveBookmarkToTab(currentModalBookmark.id, nextTabId);
          currentModalBookmark.bookmarkTabId = nextTabId;
          showFeedbackMessage('탭을 이동했습니다.');
          closeImageModal();

      });

      // 제목 수정 모달 이벤트 리스너
      cancelTitleBtn.addEventListener('click', closeEditModal);
      saveTitleBtn.addEventListener('click', saveEditedTitle);
      editTitleModal.addEventListener('click', (e) => { if (e.target === editTitleModal) closeEditModal(); });
      editTitleInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
              e.preventDefault();
              saveEditedTitle();
          }
      });
      
      // 정렬 UI는 제거됨 (최신순 고정)
    };

    // 달력 렌더링
    const renderCalendar=()=>{
      const year=currentDate.getFullYear(), month=currentDate.getMonth();
      const currentMonthYear=document.getElementById('currentMonthYear');
      const calendarGrid=document.getElementById('calendarGrid'); if(!currentMonthYear||!calendarGrid) return;
      calendarGrid.innerHTML='';
      const firstDay=new Date(year,month,1).getDay(); const daysInMonth=new Date(year,month+1,0).getDate();
      let shortsCount = 0, webtoonCount = 0;
      for(let d=1; d<=daysInMonth; d++){
        const ymd = ymdKST(new Date(year, month, d));
        if((window.taskStatus || {})[`${ymd}_daily_shorts`]) shortsCount++;
        if((window.taskStatus || {})[`${ymd}_daily_webtoon`]) webtoonCount++;
      }
      currentMonthYear.innerHTML=`${year}년 ${month+1}월 <span class="calendar-month-counts"><span class="calendar-count-badge shorts">숏 ${shortsCount}</span><span class="calendar-count-badge webtoon">툰 ${webtoonCount}</span></span>`;
      // Week starts on Monday (월~일). Convert JS getDay() (Sun=0..Sat=6) to Monday-first index.
      const leadingBlanks=(firstDay+6)%7;
      for(let i=0;i<leadingBlanks;i++){ const empty=document.createElement('div'); empty.className='calendar-day'; calendarGrid.appendChild(empty); }
      for(let day=1;day<=daysInMonth;day++){
        const dayDiv=document.createElement('div'); dayDiv.classList.add('calendar-day','relative');
        const thisDate=new Date(year,month,day); const fullDate=ymdKST(thisDate); const dayOfWeek=thisDate.getDay();
        const today=new Date(); if(ymdKST(thisDate)===ymdKST(today)) dayDiv.classList.add('today');
        const dayTop=document.createElement('div');
        dayTop.className='day-top';
        const dayNumberSpan=document.createElement('span'); dayNumberSpan.classList.add('day-number'); dayNumberSpan.textContent=day; dayTop.appendChild(dayNumberSpan);

        // 1) 매일 쇼츠/웹툰 체크 버튼 그룹 (날짜 옆에 작게 표시)
        const checkGroup = document.createElement('div');
        checkGroup.className = 'daily-check-group';

        // 쇼츠 버튼
        const shortsBtn = document.createElement('div');
        shortsBtn.className = 'daily-check-btn shorts';
        shortsBtn.textContent = '숏';
        const shortsKey = `${fullDate}_daily_shorts`;
        if ((window.taskStatus || {})[shortsKey]) shortsBtn.classList.add('active');
        shortsBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!window.ensureLogin || !window.ensureLogin()) return;
            window.taskStatus = window.taskStatus || {};
            window.taskStatus[shortsKey] = !window.taskStatus[shortsKey];
            await window.cloudSaveStateOnly();
            renderCalendar();
        });

        // 웹툰 버튼
        const webtoonBtn = document.createElement('div');
        webtoonBtn.className = 'daily-check-btn webtoon';
        webtoonBtn.textContent = '툰';
        const webtoonKey = `${fullDate}_daily_webtoon`;
        if ((window.taskStatus || {})[webtoonKey]) webtoonBtn.classList.add('active');
        webtoonBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!window.ensureLogin || !window.ensureLogin()) return;
            window.taskStatus = window.taskStatus || {};
            window.taskStatus[webtoonKey] = !window.taskStatus[webtoonKey];
            await window.cloudSaveStateOnly();
            renderCalendar();
        });

        checkGroup.appendChild(shortsBtn);
        checkGroup.appendChild(webtoonBtn);
        dayTop.appendChild(checkGroup);
        dayDiv.appendChild(dayTop);

        // 날짜/체크 버튼 아래 구분선
        const divider = document.createElement('div');
        divider.className = 'day-divider';
        dayDiv.appendChild(divider);

        // 2) 에피소드 정보 (월~금만 표시) - 날짜/체크 버튼 아래
        //    주말(토/일)은 회차 진행이 없으므로 표시하지 않음.
        if(isEpisodeDay(thisDate)){
          const episodeNumber = episodeNumberForDate(thisDate);
          const epItem=document.createElement('div'); 
          epItem.classList.add('task-item','episode-task'); 
          epItem.textContent=`${episodeNumber}화`;
          const key=`${fullDate}_바퀴멘터리 ${episodeNumber}화`; 
          if((window.taskStatus||{})[key]) epItem.classList.add('complete');
          epItem.addEventListener('click',async(e)=>{ 
            e.stopPropagation(); 
            if(!window.ensureLogin||!window.ensureLogin()) return; 
            window.taskStatus=window.taskStatus||{}; 
            window.taskStatus[key]=!window.taskStatus[key]; 
            await window.cloudSaveStateOnly(); 
            renderCalendar();
          });
          dayDiv.appendChild(epItem);
        }


        // 3) 사용자 커스텀 태스크 (개인작업) - 에피소드 아래
        (window.customTasks||[]).filter(t=>t.date===fullDate).forEach(task=>{
          const el=document.createElement('div'); 
          el.classList.add('task-item','custom-task');
          if(task.category==='important') el.classList.add('custom-important');
          if(task.category==='family') el.classList.add('custom-family');
          if(task.category==='special') el.classList.add('custom-special');
          el.textContent=task.title;
          if(task.complete) el.classList.add('complete');
          el.addEventListener('click',async(e)=>{ if(e.detail===1){ if(!window.ensureLogin||!window.ensureLogin()) return; task.complete=!task.complete; await window.cloudSaveAll(); renderCalendar(); } else if(e.detail===2){ openModal(task); }});
          dayDiv.appendChild(el);
        });

        dayDiv.addEventListener('click',(e)=>{ if(e.target.classList.contains('calendar-day')||e.target.classList.contains('day-number')) openModal({date:fullDate});});
        calendarGrid.appendChild(dayDiv);
      }

      // 달력 아래 리스트도 함께 갱신
      renderAgendaList();
    };

    // 달력 아래 리스트 (문구/추가버튼/체크박스 제거)
    const renderAgendaList = ()=>{
      if(!agendaListEl) return;
      const tasks = (window.customTasks||[]).slice();
      const order = { important: 1, family: 2, special: 3 };
      const dotColor = (cat)=>{
        if(cat==='important') return '#dc2626';
        if(cat==='family') return '#2563eb';
        if(cat==='special') return '#16a34a';
        return '#9ca3af';
      };

      // D-day 계산 (KST 자정 기준)
      const toKSTMidnight = (d)=>{
        const k = toKST(d);
        return new Date(k.getFullYear(), k.getMonth(), k.getDate());
      };
      const parseYMD = (s)=>{
        const [y,m,dd] = String(s).split('-').map(Number);
        return new Date(y, (m||1)-1, dd||1);
      };
      const diffDaysFromToday = (ymd)=>{
        const today = toKSTMidnight(new Date());
        const target = toKSTMidnight(parseYMD(ymd));
        return Math.round((target - today) / (1000*60*60*24));
      };
      const formatDday = (ymd)=>{
        const diff = diffDaysFromToday(ymd);
        if(diff === 0) return 'D-day';
        if(diff > 0) return `D-${diff}`;
        return null; // 지난 일정은 표시하지 않음
      };

      const dated = tasks
        .filter(t=>!!t.date && ['important','family','special'].includes(t.category) && formatDday(t.date))
        .sort((a,b)=>{
          const ca = !!a.complete, cb = !!b.complete;
          if(ca!==cb) return ca ? 1 : -1; // 완료는 아래로
          const da = String(a.date); const db = String(b.date);
          if(da!==db) return da.localeCompare(db);
          return (order[a.category]||99) - (order[b.category]||99);
        });

      const undated = tasks
        .filter(t=>!t.date || String(t.date).trim()==='')
        .sort((a,b)=>{
          // 미완료 우선, 그 다음 최신순
          const ca = !!a.complete, cb = !!b.complete;
          if(ca!==cb) return ca ? 1 : -1;
          return Number(b.id||0) - Number(a.id||0);
        });

      const makeRow = (t, {showDate})=>{
        const row = document.createElement('div');
        row.className = 'agenda-item';

        const dot = document.createElement('div');
        dot.className = 'agenda-dot';
        dot.style.background = dotColor(t.category);

        const date = document.createElement('div');
        date.className = 'agenda-date';
        date.textContent = showDate ? (formatDday(t.date) || '') : '';

        const text = document.createElement('div');
        text.className = 'agenda-text';
        text.textContent = t.title;
        if(t.complete){
          row.classList.add('complete');
          // 완료 표시(원래처럼): 회색 + 취소선
          text.style.textDecoration='line-through';
          text.style.opacity='.9';
          text.style.color = '#7a7a7a';
        }

        const actions = document.createElement('div');
        actions.className = 'agenda-actions';

        // 설정(편집) 버튼만 유지
        const settingsBtn = document.createElement('button');
        settingsBtn.className = 'agenda-settings-btn';
        settingsBtn.type = 'button';
        settingsBtn.setAttribute('title','설정');
        settingsBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="width:18px;height:18px;opacity:.9">
            <path d="M12 20a1 1 0 0 1-1-1v-1.1a7.8 7.8 0 0 1-1.9-.8l-.8.8a1 1 0 0 1-1.4 0l-1.4-1.4a1 1 0 0 1 0-1.4l.8-.8a7.8 7.8 0 0 1-.8-1.9H4a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1h1.1a7.8 7.8 0 0 1 .8-1.9l-.8-.8a1 1 0 0 1 0-1.4l1.4-1.4a1 1 0 0 1 1.4 0l.8.8a7.8 7.8 0 0 1 1.9-.8V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1.1a7.8 7.8 0 0 1 1.9.8l.8-.8a1 1 0 0 1 1.4 0l1.4 1.4a1 1 0 0 1 0 1.4l-.8.8a7.8 7.8 0 0 1 .8 1.9H20a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-1.1a7.8 7.8 0 0 1-.8 1.9l.8.8a1 1 0 0 1 0 1.4l-1.4 1.4a1 1 0 0 1-1.4 0l-.8-.8a7.8 7.8 0 0 1-1.9.8V19a1 1 0 0 1-1 1z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>`;
        settingsBtn.addEventListener('click',(e)=>{ e.stopPropagation(); openModal(t); });
        actions.appendChild(settingsBtn);

        row.appendChild(dot);
        row.appendChild(date);
        row.appendChild(text);
        row.appendChild(actions);

        // 항목 클릭: 완료 토글(체크박스 대신)
        row.addEventListener('click', async ()=>{
          if(!window.ensureLogin||!window.ensureLogin()) return;
          t.complete = !t.complete;

          // 즉시 UI 반영: 회색 + 취소선 (원래처럼)
          row.classList.toggle('complete', !!t.complete);
          if(t.complete){
            text.style.textDecoration='line-through';
            text.style.opacity='.9';
            text.style.color = '#7a7a7a';
          } else {
            text.style.textDecoration='';
            text.style.opacity='';
            text.style.color = '';
          }

          // 완료 항목은 아래로 이동
          if(row.parentElement){
            const parent = row.parentElement;
            if(t.complete) parent.appendChild(row);
            else parent.prepend(row);
          }

          await window.cloudSaveAll();
          renderCalendar();
        });
        return row;
      };

      agendaListEl.innerHTML = '';

      // 1) 날짜 없는 항목을 위로
      undated.forEach(t=>agendaListEl.appendChild(makeRow(t,{showDate:false})));
      // 2) 날짜 있는 일정은 아래로
      dated.forEach(t=>agendaListEl.appendChild(makeRow(t,{showDate:true})));
    };

    // 유튜브 썸네일 URL 추출
    function getYoutubeThumbnail(url) {
        let videoId = null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        if (match && match[2].length === 11) {
            videoId = match[2];
        }
        if (videoId) {
            return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
        }
        return null;
    }
    
    // 인스타그램 임베드 스크립트를 로드하고 콘텐츠를 처리하는 함수
    function initializeInstagramEmbeds() {
        if (window.instgrm && window.instgrm.Embeds) {
            // 스크립트가 이미 로드된 경우, 새 게시물을 처리
            window.instgrm.Embeds.process();
            return;
        }

        // 스크립트 로드
        const scriptId = 'instagram-embed-script';
        if (!document.getElementById(scriptId)) {
            const script = document.createElement('script');
            script.id = scriptId;
            script.async = true;
            script.src = '//www.instagram.com/embed.js';
            document.head.appendChild(script);
            
            // 스크립트 로드 후에도 process를 한 번 더 호출할 수 있도록 window에 핸들러 등록
            script.onload = () => {
                if (window.instgrm && window.instgrm.Embeds) {
                    window.instgrm.Embeds.process();
                }
            };
        }
    }

    // 북마크 렌더링 (이미지 및 동영상 포함)
    const renderImageBookmarks=()=>{
      imageGrid.innerHTML='';
      
      const activeBookmarkTabId = window.__bookmarkActiveTabId || 'default';
      let sortedBookmarks = [...(window.imageBookmarks || [])].filter(d => (d.bookmarkTabId || 'default') === activeBookmarkTabId);

      // 최신순 고정
      sortedBookmarks.sort((a, b) => ((b.timestamp?.toMillis?.() || b.timestampMs || 0) - (a.timestamp?.toMillis?.() || a.timestampMs || 0)));

      sortedBookmarks.forEach(d=>{
        const isVideo = d.type === 'video';
        const isLink = d.type === 'link'; // 일반 페이지 링크
        const isInstagram = d.type === 'instagram'; // 인스타그램 게시물
        const isImage = d.type === 'drive_image' || d.type === 'remote' || !!d.driveFileId;
        
        const isEditable = isVideo || isLink || isInstagram; // 제목 수정 가능한 항목
        const imageUrl = d.url;
        const pageUrl = d.pageUrl; // 일반 URL, 동영상 URL 또는 인스타그램 게시물 URL
        const sourceDomain = d.sourceDomain || 'Unknown Source';

        // (사이트별 헤더 제거)
        
        let thumbnail = isVideo ? getYoutubeThumbnail(pageUrl) : imageUrl;
        let iconHtml = '';
        let urlToOpen = pageUrl;

        if (isLink) {
            // 일반 페이지 링크 북마크: 제목/URL 미표시. previewImageUrl이 있으면 그 이미지만 표시.
            const prevImg = d.previewImageUrl || null;
            if (prevImg) {
                iconHtml = `<img src="${prevImg}" alt="링크 미리보기" loading="lazy" decoding="async" class="img-fit-cover" onerror="this.onerror=null;this.src='https://placehold.co/100x120/444/fff?text=미리보기+오류'"/>`;
            } else {
                iconHtml = `<div class="icon-overlay">
                              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px;opacity:.9">
                                <path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11 4"/>
                                <path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07L13 20"/>
                              </svg>
                            </div>`;
            }
        } else if (isInstagram) {
             // 인스타그램 게시물 북마크 (퍼가기 코드 사용)
             // 원본 URL 추출 (클릭 시 이동용)
             const parser = new DOMParser();
             const doc = parser.parseFromString(d.embedCode || '', 'text/html');
             const blockquote = doc.querySelector('blockquote.instagram-media');
             if (blockquote && blockquote.cite) urlToOpen = blockquote.cite;
             else urlToOpen = pageUrl;
             
             const displayTitle = d.title || 'Instagram Post (클릭 시 원본 이동)';
             
             // Embed Code를 직접 삽입하여 인스타그램 미리보기가 렌더링되도록 함.
             // z-index를 사용하여 제목 오버레이가 임베드 위에 오도록 설정.
             // 인스타그램 임베드는 높이가 가변적이며, Masonry 레이아웃이 이를 처리하도록 기대함.
             iconHtml = `
                <div class="w-full h-full relative z-0">
                    ${d.embedCode || ''}
                    <div class="absolute top-0 left-0 right-0 p-2 bg-black bg-opacity-70 text-white text-sm font-bold z-10">${displayTitle}</div>
                </div>
             `;

        } else if (isVideo && !thumbnail) {
            // **수정된 부분: 썸네일 없는 비디오를 위한 새로운 제목 오버레이 스타일 적용**
            const displayTitle = d.title || '동영상 북마크 (제목 편집 가능)';
            const displayUrl = pageUrl.replace(/^https?:\/\//, '').substring(0, 30) + '...';
            
            iconHtml = `<div class="video-title-overlay">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-400 mb-2" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4l12 8-12 8z"/></svg>
                            <span class="video-title-text">${displayTitle}</span>
                            <span class="video-url-text">${displayUrl}</span>
                        </div>`;
        } else if (isImage) {
            // [수정] 이미지 북마크인 경우 (썸네일은 이미지 URL 자체)
            iconHtml = `<img src="${imageUrl}" alt="북마크된 이미지" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='https://placehold.co/100x120/444/fff?text=이미지+오류'"/>`;
        } else if (isVideo) {
            // [수정] 유튜브 동영상이고 썸네일이 있는 경우
            const displayTitle = d.title || 'YouTube 영상';
            iconHtml = `<img src="${thumbnail}" alt="동영상 썸네일" loading="lazy" decoding="async" class="img-fit-cover" onerror="this.onerror=null;this.src='https://placehold.co/100x120/444/fff?text=동영상+썸네일'"/>
                        <div class="icon-overlay flex-col">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4l12 8-12 8z"/></svg>
                            <span class="text-xs mt-1 font-bold">${displayTitle}</span>
                        </div>`;

    function extractYoutubeVideoId(url){
      if(!url) return null;
      const text = String(url).trim();
      try{
        const u = new URL(text.includes('://') ? text : 'https://' + text);
        const host = u.hostname.replace(/^www\./,'');
        if(host === 'youtu.be') return (u.pathname.split('/').filter(Boolean)[0] || '').slice(0,11);
        if(host.endsWith('youtube.com') || host.endsWith('youtube-nocookie.com')){
          if(u.searchParams.get('v')) return u.searchParams.get('v').slice(0,11);
          const parts = u.pathname.split('/').filter(Boolean);
          const keys = ['embed','shorts','live'];
          if(keys.includes(parts[0]) && parts[1]) return parts[1].slice(0,11);
        }
      }catch(_){/* 정규식 fallback */}
      const m = text.match(/(?:v=|youtu\.be\/|embed\/|shorts\/|live\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function normalizeYoutubeUrl(url){
      const id = extractYoutubeVideoId(url);
      return id ? `https://www.youtube.com/watch?v=${id}` : String(url || '').trim();
    }

    function looksAutoTitle(song){
      const t = String(song?.title || '').trim();
      return !!song?.autoTitle || !t || t === `YouTube ${song?.videoId}` || t === '제목 불러오기 실패' || /^YouTube [A-Za-z0-9_-]{11}$/.test(t);
    }

    function cleanYoutubeTitle(title){
      let t = String(title || '').trim();
      t = t.replace(/\s*-\s*YouTube\s*$/i, '').trim();
      t = t.replace(/^YouTube\s*[-:]\s*/i, '').trim();
      return t;
    }


    function parseYoutubeISODuration(iso){
      const m = String(iso || '').match(/^P(?:(\d+)D)?T?(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/);
      if(!m) return 0;
      return (Number(m[1]||0)*86400) + (Number(m[2]||0)*3600) + (Number(m[3]||0)*60) + Number(m[4]||0);
    }

    async function youtubeApiGet(path, params={}){
      if(!YOUTUBE_API_KEY) throw new Error('YouTube API 키가 없습니다.');
      const url = new URL(`https://www.googleapis.com/youtube/v3/${path}`);
      url.searchParams.set('key', YOUTUBE_API_KEY);
      Object.entries(params).forEach(([k,v])=>{
        if(v !== undefined && v !== null && String(v) !== '') url.searchParams.set(k, String(v));
      });
      const res = await fetch(url.toString(), {cache:'no-store'});
      const data = await res.json().catch(()=>({}));
      if(!res.ok){
        const msg = data?.error?.message || `${res.status} ${res.statusText}`;
        throw new Error(msg);
      }
      return data;
    }

    async function fetchYoutubeVideosMeta(videoIds){
      const ids = [...new Set((videoIds || []).filter(Boolean))];
      const meta = {};
      for(let i=0; i<ids.length; i+=50){
        const chunk = ids.slice(i, i+50);
        const data = await youtubeApiGet('videos', {
          part:'snippet,contentDetails',
          id:chunk.join(','),
          maxResults:50
        });
        (data.items || []).forEach(item=>{
          const seconds = parseYoutubeISODuration(item?.contentDetails?.duration);
          const channelTitle = cleanYoutubeArtistName(item?.snippet?.channelTitle || '');
          meta[item.id] = {
            videoId:item.id,
            title: cleanYoutubeTitle(item?.snippet?.title || `YouTube ${item.id}`),
            durationSeconds: seconds,
            durationText: formatWorkMusicDuration(seconds),
            thumbnail: item?.snippet?.thumbnails?.medium?.url || item?.snippet?.thumbnails?.default?.url || '',
            channelTitle,
            artist: channelTitle
          };
        });
      }
      return meta;
    }

    function formatWorkMusicDuration(seconds){
      const n = Math.floor(Number(seconds || 0));
      if(!Number.isFinite(n) || n <= 0) return '';
      const h = Math.floor(n / 3600);
      const m = Math.floor((n % 3600) / 60);
      const sec = n % 60;
      if(h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    function parseDurationTextToSeconds(text){
      const parts = String(text || '').trim().split(':').map(v=>Number(v));
      if(!parts.length || parts.some(v=>!Number.isFinite(v))) return 0;
      if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
      if(parts.length === 2) return parts[0]*60 + parts[1];
      return parts[0] || 0;
    }

    function parseDurationFromHtml(html){
      const text = String(html || '');
      const length = text.match(/"lengthSeconds"\s*:\s*"?(\d+)"?/i);
      if(length) return Number(length[1]) || 0;
      const dur = text.match(/"duration"\s*:\s*"PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?"/i);
      if(dur) return (Number(dur[1]||0)*3600) + (Number(dur[2]||0)*60) + Number(dur[3]||0);
      return 0;
    }

    async function fetchYoutubeDuration(videoIdOrUrl){
      const videoId = extractYoutubeVideoId(videoIdOrUrl) || String(videoIdOrUrl || '').trim();
      if(!videoId) return 0;
      try{
        const meta = await fetchYoutubeVideosMeta([videoId]);
        if(meta[videoId]?.durationSeconds) return meta[videoId].durationSeconds;
      }catch(err){ console.warn('YouTube API duration failed', err); }
      const cleanUrl = `https://www.youtube.com/watch?v=${videoId}`;
      const endpoints = [
        { type:'json', url:`https://api.allorigins.win/get?url=${encodeURIComponent(cleanUrl)}` },
        { type:'text', url:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(cleanUrl)}` }
      ];
      for(const endpoint of endpoints){
        try{
          const res = await fetch(endpoint.url, {cache:'no-store'});
          if(!res.ok) continue;
          let html = '';
          if(endpoint.type === 'json'){
            const data = await res.json();
            html = data.contents || data.data || '';
          }else{
            html = await res.text();
          }
          const seconds = parseDurationFromHtml(html);
          if(seconds) return seconds;
        }catch(_){/* 다음 endpoint 시도 */}
      }
      return 0;
    }

    function parseTitleFromHtml(html){
      const text = String(html || '');
      const og = text.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i)
              || text.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:title["']/i)
              || text.match(/<title[^>]*>([^<]+)<\/title>/i);
      if(!og) return '';
      const textarea = document.createElement('textarea');
      textarea.innerHTML = og[1];
      return cleanYoutubeTitle(textarea.value);
    }

    async function fetchYoutubeTitle(url){
      const cleanUrl = normalizeYoutubeUrl(url);
      const videoId = extractYoutubeVideoId(cleanUrl);
      if(videoId){
        try{
          const meta = await fetchYoutubeVideosMeta([videoId]);
          if(meta[videoId]?.title) return meta[videoId].title;
        }catch(err){ console.warn('YouTube API title failed', err); }
      }
      const endpoints = [
        { type:'json', url:`https://www.youtube.com/oembed?format=json&url=${encodeURIComponent(cleanUrl)}` },
        { type:'json', url:`https://noembed.com/embed?url=${encodeURIComponent(cleanUrl)}` },
        { type:'json', url:`https://api.allorigins.win/get?url=${encodeURIComponent(cleanUrl)}` },
        { type:'text', url:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(cleanUrl)}` }
      ];
      for(const endpoint of endpoints){
        try{
          const res = await fetch(endpoint.url, {cache:'no-store'});
          if(!res.ok) continue;
          if(endpoint.type === 'json'){
            const data = await res.json();
            const title = cleanYoutubeTitle(data.title || parseTitleFromHtml(data.contents || ''));
            if(title) return title;
          }else{
            const html = await res.text();
            const title = parseTitleFromHtml(html);
            if(title) return title;
          }
        }catch(_){/* 다음 endpoint 시도 */}
      }
      return '';
    }

    async function fillMissingWorkMusicTitles(){
      const songs = window.workMusicSongs || [];
      const targets = songs.filter(looksAutoTitle);
      if(!targets.length) return;
      let changed = false;

      if(changed){

        renderWorkMusic();

    async function fillMissingWorkMusicDurations(){
      const songs = window.workMusicSongs || [];
      const targets = songs.filter(s=>s?.videoId && !s.durationSeconds);
      if(!targets.length) return;
      let changed = false;
      for(const song of targets.slice(0, 25)){

    function rememberWorkMusicDuration(index, seconds){
      const songs = getActiveWorkMusicSongs();
      const song = songs[index];
      const n = Math.floor(Number(seconds || 0));
      if(!song || !n || song.durationSeconds) return;
      song.durationSeconds = n;
      renderWorkMusic();
      clearTimeout(workMusicDurationSaveTimer);
      workMusicDurationSaveTimer = setTimeout(()=>window.cloudSaveWorkMusic?.(), 800);
    }

    function getWorkMusicNextIndex(step=1){
      const songs = getActiveWorkMusicSongs();
      if(!songs.length) return -1;
      const cur = Math.max(0, Number(window.workMusicCurrentIndex || 0));
      if(window.workMusicMode === 'random' && songs.length > 1){
        let next = cur;
        while(next === cur) next = Math.floor(Math.random()*songs.length);
        return next;
      }
      return (cur + step + songs.length) % songs.length;
    }

    function shuffledWorkMusicIndexes(startIndex){
      const songs = getActiveWorkMusicSongs();
      const indexes = songs.map((_, i)=>i).filter(i=>i!==startIndex);
      for(let i=indexes.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [indexes[i], indexes[j]] = [indexes[j], indexes[i]];
      }
      return [startIndex, ...indexes];
    }

    function getWorkMusicPlayOrder(startIndex){
      const songs = getActiveWorkMusicSongs();
      if(!songs.length) return [];
      if(window.workMusicMode === 'random') return shuffledWorkMusicIndexes(startIndex);
      return songs.map((_, offset)=>(startIndex + offset) % songs.length);
    }

    function getWorkMusicDisplayOrder(songs){
      const count = songs.length;
      if(!count) return [];
      if(window.workMusicMode !== 'random') return songs.map((_, i)=>i);
      const activeTabId = getActiveWorkMusicTabId();
      const idsKey = songs.map(s=>s.id || s.videoId || '').join('|');
      const cache = window.__workMusicDisplayShuffle || {};
      const cached = cache[activeTabId];
      if(cached && cached.idsKey === idsKey && Array.isArray(cached.order) && cached.order.length === count){
        return cached.order.filter(i=>i>=0 && i<count);
      }
      const order = songs.map((_, i)=>i);
      for(let i=order.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      window.__workMusicDisplayShuffle = {...cache, [activeTabId]: {idsKey, order}};
      return order;
    }


    function getWorkMusicInitialDisplayIndex(songs=getActiveWorkMusicSongs()){
      if(!songs.length) return 0;
      if(window.workMusicMode !== 'random') return 0;
      const order = getWorkMusicDisplayOrder(songs);
      return Number.isInteger(order[0]) ? order[0] : 0;
    }

    function resetWorkMusicDisplayShuffle(tabId=getActiveWorkMusicTabId()){
      window.__workMusicDisplayShuffle = window.__workMusicDisplayShuffle || {};
      delete window.__workMusicDisplayShuffle[tabId];
    }

    function sendWorkMusicCommand(func, args=[]){
      try{
        if(workMusicPlayer && typeof workMusicPlayer[func] === 'function'){
          workMusicPlayer[func](...(args || []));
          return;
        }
        if(!workMusicIframe?.contentWindow) return;
        workMusicIframe.contentWindow.postMessage(JSON.stringify({event:'command', func, args}), '*');
      }catch(err){ console.warn('YouTube command failed', err); }
    }

    function renderWorkMusicVolumeUI(){
      const raw = Math.max(0, Math.min(100, Number(window.workMusicVolume ?? 80)));
      const muted = !!window.workMusicIsMuted || raw === 0;
      const display = muted ? 0 : raw;
      if(workMusicVolumeRange) workMusicVolumeRange.value = String(display);
      if(workMusicVolumePercent) workMusicVolumePercent.textContent = `${display}%`;
      if(workMusicRemoteVolumeRange) workMusicRemoteVolumeRange.value = String(display);
      if(workMusicRemoteVolumePercent) workMusicRemoteVolumePercent.textContent = `${display}%`;
      if(workMusicMuteBtn){
        workMusicMuteBtn.innerHTML = muted ? workMusicMutedSvg : workMusicVolumeSvg;
        workMusicMuteBtn.title = muted ? '음소거 해제' : '음소거';
        workMusicMuteBtn.setAttribute('aria-label', muted ? '음소거 해제' : '음소거');
      }
      if(workMusicRemoteMuteBtn){
        workMusicRemoteMuteBtn.innerHTML = muted ? workMusicMutedSvg : workMusicVolumeSvg;
        workMusicRemoteMuteBtn.title = muted ? '음소거 해제' : '음소거';
        workMusicRemoteMuteBtn.setAttribute('aria-label', muted ? '음소거 해제' : '음소거');
      }
    }

    function applyWorkMusicVolume(){
      const raw = Math.max(0, Math.min(100, Number(window.workMusicVolume ?? 80)));
      const muted = !!window.workMusicIsMuted || raw === 0;
      const playerVolume = muted ? 0 : raw;
      renderWorkMusicVolumeUI();
      sendWorkMusicCommand('setVolume', [playerVolume]);
      if(muted) sendWorkMusicCommand('mute'); else sendWorkMusicCommand('unMute');
    }

    async function setWorkMusicVolume(value, {save=true}={}){
      const v = Math.max(0, Math.min(100, Math.round(Number(value || 0) / 5) * 5));
      window.workMusicVolume = v;
      window.workMusicIsMuted = v === 0;

    function ensureYouTubeIframeAPI(){
      if(window.YT && window.YT.Player) return Promise.resolve();
      if(window.__workMusicYTApiPromise) return window.__workMusicYTApiPromise;
      window.__workMusicYTApiPromise = new Promise((resolve)=>{
        const prev = window.onYouTubeIframeAPIReady;
        window.onYouTubeIframeAPIReady = function(){
          if(typeof prev === 'function') try{ prev(); }catch(_){/* ignore */}
          resolve();
        };
        if(!document.querySelector('script[src="https://www.youtube.com/iframe_api"]')){
          const tag = document.createElement('script');
          tag.src = 'https://www.youtube.com/iframe_api';
          document.head.appendChild(tag);
        }
        const check = setInterval(()=>{
          if(window.YT && window.YT.Player){ clearInterval(check); resolve(); }
        }, 200);
      });
      return window.__workMusicYTApiPromise;
    }

    function syncWorkMusicFromPlayer(){
      try{
        if(!workMusicPlayer || typeof workMusicPlayer.getPlaylistIndex !== 'function') return;
        const ytIndex = Number(workMusicPlayer.getPlaylistIndex());
        const order = window.workMusicCurrentPlayOrder || [];
        const mapped = Number.isFinite(ytIndex) ? order[ytIndex] : undefined;
        const songs = getActiveWorkMusicSongs();
        if(Number.isInteger(mapped) && mapped >= 0 && mapped < songs.length && mapped !== Number(window.workMusicCurrentIndex || 0)){
          window.workMusicCurrentIndex = mapped;
          renderWorkMusic();
          window.cloudSaveWorkMusic?.();
        }
        if(Number.isInteger(Number(window.workMusicCurrentIndex)) && typeof workMusicPlayer.getDuration === 'function'){
          const seconds = workMusicPlayer.getDuration();
          rememberWorkMusicDuration(Number(window.workMusicCurrentIndex || 0), seconds);
        }
      }catch(err){ console.warn('work music sync failed', err); }
    }

    function startWorkMusicSyncTimer(){
      clearInterval(workMusicSyncTimer);
      workMusicSyncTimer = setInterval(syncWorkMusicFromPlayer, 900);
    }

    function stopWorkMusicSyncTimer(){
      clearInterval(workMusicSyncTimer);
      workMusicSyncTimer = null;
    }

    function onWorkMusicPlayerStateChange(event){
      const state = event?.data;
      if(window.YT && state === window.YT.PlayerState.PLAYING){
        window.workMusicIsPlaying = true;
        syncWorkMusicFromPlayer();
        renderWorkMusicPlayButton();
        renderWorkMusic();
        startWorkMusicSyncTimer();

    function extractYoutubePlaylistId(raw){
      const text = String(raw || '').trim();
      if(!text) return null;
      try{
        const u = new URL(text.includes('://') ? text : 'https://' + text);
        const list = u.searchParams.get('list');
        if(list && list.length >= 10) return list;
      }catch(_){/* regex fallback */}
      const m = text.match(/[?&]list=([A-Za-z0-9_-]+)/) || text.match(/(?:playlist\?list=)([A-Za-z0-9_-]+)/);
      return m ? m[1] : null;
    }

    function isYoutubeMusicUrl(raw){
      try{
        const u = new URL(String(raw || '').includes('://') ? String(raw || '') : 'https://' + String(raw || ''));
        return u.hostname.replace(/^www\./,'').toLowerCase().includes('music.youtube.com');
      }catch(_){ return /music\.youtube\.com/i.test(String(raw || '')); }
    }

    function cleanYoutubeArtistName(name){
      return String(name || '').trim()
        .replace(/\s*-\s*Topic$/i, '')
        .replace(/\s*-\s*Official$/i, '')
        .replace(/\s*VEVO$/i, '')
        .trim();
    }

    function getSongArtist(song){
      const explicit = cleanYoutubeArtistName(song?.artist || song?.channelTitle || song?.ownerChannelTitle || '');
      if(explicit) return explicit;
      const title = String(song?.title || '');
      const parts = title.split(/\s[-–—]\s/);
      if(parts.length >= 2) return cleanYoutubeArtistName(parts[0]);
      return '';
    }

    function decodeHtmlEntities(str){
      const textarea = document.createElement('textarea');
      textarea.innerHTML = String(str || '');
      return textarea.value;
    }

    function extractYtInitialData(html){
      const text = String(html || '');
      const key = 'ytInitialData';
      let pos = text.indexOf(key);
      if(pos < 0) return null;
      pos = text.indexOf('{', pos);
      if(pos < 0) return null;
      let depth = 0, inString = false, esc = false;
      for(let i=pos; i<text.length; i++){
        const ch = text[i];
        if(inString){
          if(esc) esc = false;
          else if(ch === '\\') esc = true;
          else if(ch === '"') inString = false;
          continue;
        }
        if(ch === '"'){ inString = true; continue; }
        if(ch === '{') depth++;
        else if(ch === '}'){
          depth--;
          if(depth === 0){
            try{ return JSON.parse(text.slice(pos, i+1)); }catch(_){ return null; }
          }
        }
      }
      return null;
    }

    function ytText(node){
      if(!node) return '';
      if(typeof node === 'string') return node;
      if(node.simpleText) return String(node.simpleText);
      if(Array.isArray(node.runs)) return node.runs.map(r=>r.text || '').join('').trim();
      return '';
    }

    function parsePlaylistFeedXml(xmlText, playlistId){
      const items = [];
      const seen = new Set();
      let playlistTitle = '';
      try{
        const xml = new DOMParser().parseFromString(String(xmlText || ''), 'text/xml');
        const feedTitle = xml.querySelector('feed > title');
        playlistTitle = cleanYoutubeTitle(feedTitle?.textContent || '새 재생목록');
        xml.querySelectorAll('entry').forEach(entry=>{
          const videoId = entry.querySelector('videoId, yt\\:videoId')?.textContent?.trim();
          const title = cleanYoutubeTitle(entry.querySelector('title')?.textContent || '');
          const thumb = entry.querySelector('thumbnail, media\\:thumbnail')?.getAttribute('url') || '';
          if(videoId && !seen.has(videoId)){
            seen.add(videoId);
            items.push({
              videoId,
              title: title || `YouTube ${videoId}`,
              thumbnail: thumb,
              durationText: '',
              durationSeconds: 0
            });
          }
        });
      }catch(err){ console.warn('playlist feed parse failed', err); }
      return { title: playlistTitle || '새 재생목록', items, playlistId };
    }

    function parsePlaylistFromHtml(html, playlistId){
      const items = [];
      const seen = new Set();
      let playlistTitle = '';
      const data = extractYtInitialData(html);
      const visit = (node)=>{
        if(!node || typeof node !== 'object') return;
        if(node.playlistVideoRenderer){
          const r = node.playlistVideoRenderer;
          const videoId = r.videoId;
          const title = cleanYoutubeTitle(ytText(r.title));
          const durationText = ytText(r.lengthText) || ytText(r.thumbnailOverlays?.find?.(o=>o.thumbnailOverlayTimeStatusRenderer)?.thumbnailOverlayTimeStatusRenderer?.text);
          const durationSeconds = parseDurationTextToSeconds(durationText);
          const thumb = r.thumbnail?.thumbnails?.slice?.(-1)?.[0]?.url || '';
          if(videoId && !seen.has(videoId)){
            seen.add(videoId);
            items.push({videoId, title: title || `YouTube ${videoId}`, thumbnail: thumb, durationText: durationText || '', durationSeconds: durationSeconds || 0});
          }
        }
        if(node.videoId && node.title && !node.playlistVideoRenderer){
          const videoId = node.videoId;
          const title = cleanYoutubeTitle(ytText(node.title));
          if(/^[A-Za-z0-9_-]{11}$/.test(videoId) && !seen.has(videoId)){
            seen.add(videoId);
            items.push({videoId, title: title || `YouTube ${videoId}`, durationText:'', durationSeconds:0});
          }
        }
        if(node.playlistMetadataRenderer?.title && !playlistTitle){
          playlistTitle = cleanYoutubeTitle(node.playlistMetadataRenderer.title);
        }
        if(node.playlistHeaderRenderer?.title && !playlistTitle){
          playlistTitle = cleanYoutubeTitle(ytText(node.playlistHeaderRenderer.title));
        }
        if(node.microformatDataRenderer?.title && !playlistTitle){
          playlistTitle = cleanYoutubeTitle(node.microformatDataRenderer.title);
        }
        for(const v of Object.values(node)){
          if(v && typeof v === 'object'){
            if(Array.isArray(v)) v.forEach(visit); else visit(v);
          }
        }
      };
      if(data) visit(data);

      if(!items.length){
        const htmlText = String(html || '');
        const re = /"playlistVideoRenderer"\s*:\s*\{[\s\S]*?"videoId"\s*:\s*"([A-Za-z0-9_-]{11})"[\s\S]*?"title"\s*:\s*\{\s*"runs"\s*:\s*\[\s*\{\s*"text"\s*:\s*"([\s\S]*?)"/g;
        let m;
        while((m = re.exec(htmlText))){
          const videoId = m[1];
          if(seen.has(videoId)) continue;
          seen.add(videoId);
          items.push({videoId, title: cleanYoutubeTitle(decodeHtmlEntities(m[2].replace(/\\u0026/g, '&'))) || `YouTube ${videoId}`, durationText:'', durationSeconds:0});
        }
      }
      if(!items.length){
        const htmlText = String(html || '');
        const re = /"videoId"\s*:\s*"([A-Za-z0-9_-]{11})"/g;
        let m;
        while((m = re.exec(htmlText))){
          const videoId = m[1];
          if(seen.has(videoId)) continue;
          seen.add(videoId);
          items.push({videoId, title:`YouTube ${videoId}`, durationText:'', durationSeconds:0});
        }
      }
      if(!playlistTitle){
        const og = String(html||'').match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i)
                || String(html||'').match(/<title[^>]*>([^<]+)<\/title>/i);
        if(og) playlistTitle = cleanYoutubeTitle(decodeHtmlEntities(og[1]).replace(/\s*-\s*YouTube\s*$/i,''));
      }
      return { title: playlistTitle || '새 재생목록', items, playlistId };
    }

    async function fetchTextThroughProxies(targetUrl){
      const endpoints = [
        {type:'text', url:`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`},
        {type:'json', url:`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`},
        {type:'text', url:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`},
        {type:'text', url:`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`}
      ];
      let lastError = '';
      for(const endpoint of endpoints){
        try{
          const res = await fetch(endpoint.url, {cache:'no-store'});
          if(!res.ok){ lastError = `${res.status} ${res.statusText}`; continue; }
          if(endpoint.type === 'json'){
            const data = await res.json();
            const text = data.contents || data.data || '';
            if(text) return text;
          }else{
            const text = await res.text();
            if(text) return text;
          }
        }catch(err){ lastError = err?.message || String(err); console.warn('playlist proxy failed', endpoint.url, err); }
      }
      console.warn('playlist all proxies failed', targetUrl, lastError);
      return '';
    }

    async function fetchYoutubePlaylistData(playlistId){
      const cleanId = String(playlistId || '').trim();
      if(!cleanId) return { title:'새 재생목록', items:[], playlistId:cleanId };

      // 1차: YouTube Data API v3. 공개/일부공개 재생목록은 이 방식이 가장 안정적입니다.
      try{
        let playlistTitle = '새 재생목록';
        try{
          const plist = await youtubeApiGet('playlists', {part:'snippet', id:cleanId, maxResults:1});
          playlistTitle = cleanYoutubeTitle(plist?.items?.[0]?.snippet?.title || playlistTitle);
        }catch(err){ console.warn('YouTube API playlist title failed', err); }

        const rawItems = [];
        let pageToken = '';
        do{
          const data = await youtubeApiGet('playlistItems', {
            part:'snippet,contentDetails',
            playlistId:cleanId,
            maxResults:50,
            pageToken
          });
          (data.items || []).forEach(item=>{
            const videoId = item?.contentDetails?.videoId || item?.snippet?.resourceId?.videoId;
            const title = cleanYoutubeTitle(item?.snippet?.title || '');
            // 삭제/비공개 영상은 제목이 이런 식으로 내려올 수 있으므로 제외
            if(!videoId || /^Deleted video$/i.test(title) || /^Private video$/i.test(title)) return;
            rawItems.push({videoId, title: title || `YouTube ${videoId}`, ownerChannelTitle: cleanYoutubeArtistName(item?.snippet?.videoOwnerChannelTitle || item?.snippet?.channelTitle || '')});
          });
          pageToken = data.nextPageToken || '';
        }while(pageToken);

        if(rawItems.length){
          const meta = await fetchYoutubeVideosMeta(rawItems.map(v=>v.videoId)).catch(err=>{
            console.warn('YouTube API videos meta failed', err);
            return {};
          });
          const seen = new Set();
          const items = rawItems.filter(v=>{
            if(seen.has(v.videoId)) return false;
            seen.add(v.videoId);
            return true;
          }).map(v=>({
            videoId: v.videoId,
            title: meta[v.videoId]?.title || v.title || `YouTube ${v.videoId}`,
            durationSeconds: meta[v.videoId]?.durationSeconds || 0,
            durationText: meta[v.videoId]?.durationText || '',
            thumbnail: meta[v.videoId]?.thumbnail || '',
            artist: meta[v.videoId]?.artist || v.ownerChannelTitle || '',
            channelTitle: meta[v.videoId]?.channelTitle || v.ownerChannelTitle || ''
          }));
          return { title: playlistTitle || '새 재생목록', items, playlistId:cleanId };
        }
      }catch(err){
        console.warn('YouTube API playlist failed. fallback start:', err);
      }

      const feedUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=${encodeURIComponent(cleanId)}`;
      const playlistUrl = `https://www.youtube.com/playlist?list=${encodeURIComponent(cleanId)}`;
      const musicPlaylistUrl = `https://music.youtube.com/playlist?list=${encodeURIComponent(cleanId)}`;

      // 2차: YouTube 공식 RSS 피드.
      const feedText = await fetchTextThroughProxies(feedUrl);
      if(feedText){
        const parsedFeed = parsePlaylistFeedXml(feedText, cleanId);
        if(parsedFeed.items.length) return parsedFeed;
      }

      // 3차: 일반 YouTube 재생목록 페이지 HTML 파싱.
      const html = await fetchTextThroughProxies(playlistUrl);
      if(html){
        const parsed = parsePlaylistFromHtml(html, cleanId);
        if(parsed.items.length) return parsed;
      }

      // 4차: YouTube Music 재생목록 페이지 HTML 파싱.
      const musicHtml = await fetchTextThroughProxies(musicPlaylistUrl);
      if(musicHtml){
        const parsedMusic = parsePlaylistFromHtml(musicHtml, cleanId);
        if(parsedMusic.items.length) return parsedMusic;
      }

      return { title:'새 재생목록', items:[], playlistId:cleanId };
    }

        return {
          ...(old || {}),
          id: old?.id || (now + idx),
          url: `https://www.youtube.com/watch?v=${item.videoId}`,
          videoId: item.videoId,
          title: keepManualTitle ? old.title : (item.title || old?.title || `YouTube ${item.videoId}`),
          artist: item.artist || item.channelTitle || old?.artist || old?.channelTitle || '',
          channelTitle: item.channelTitle || item.artist || old?.channelTitle || old?.artist || '',
          thumbnail: item.thumbnail || old?.thumbnail || '',
          autoTitle: keepManualTitle ? false : false,
          durationText: item.durationText || formatWorkMusicDuration(item.durationSeconds) || old?.durationText || '',
          durationSeconds: item.durationSeconds || old?.durationSeconds || 0,
          addedAt: old?.addedAt || (now + idx),
          workMusicTabId: tabId,
          sourcePlaylistId: data.playlistId || playlistId,
          sourceType: playlistSourceType
        };
      });

        if(workMusicPlaceholderEl) return;
        workMusicPlaceholderEl = document.createElement('div');
        workMusicPlaceholderEl.className = 'workmusic-tab placeholder';
        workMusicPlaceholderEl.style.width = (width || 80) + 'px';
        workMusicPlaceholderEl.style.height = '32px';
        workMusicPlaceholderEl.style.border = '1px dashed rgba(255,255,255,.25)';
        workMusicPlaceholderEl.style.background = 'transparent';
      }
      function getWorkMusicDragAfterElement(container, x){
        const els = [...container.querySelectorAll('.workmusic-tab:not(.dragging):not(.placeholder)')];
        let closest = {offset:Number.NEGATIVE_INFINITY, element:null};
        for(const child of els){
          const box = child.getBoundingClientRect();
          const offset = x - (box.left + box.width/2);
          if(offset < 0 && offset > closest.offset) closest = {offset, element:child};
        }
        return closest.element;
      }
      workMusicTabsContainer?.addEventListener('dragstart', (e)=>{
        if(!window.__workMusicEditMode) return;
        const tabBtn = e.target.closest('.workmusic-tab'); if(!tabBtn) return;
        workMusicDraggingEl = tabBtn; workMusicDraggingEl.classList.add('dragging');
        ensureWorkMusicPlaceholder(tabBtn.getBoundingClientRect().width);
        workMusicPlaceholderEl.style.width = tabBtn.getBoundingClientRect().width + 'px';
        tabBtn.after(workMusicPlaceholderEl);
        if(e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
      });
      workMusicTabsContainer?.addEventListener('dragover', (e)=>{
        if(!window.__workMusicEditMode || !workMusicDraggingEl) return;
        e.preventDefault();
        const afterEl = getWorkMusicDragAfterElement(workMusicTabsContainer, e.clientX);
        if(!afterEl) workMusicTabsContainer.appendChild(workMusicPlaceholderEl); else workMusicTabsContainer.insertBefore(workMusicPlaceholderEl, afterEl);

      async function finalizeWorkMusicTabReorder(){
        if(!workMusicDraggingEl || !workMusicPlaceholderEl) return;

      if(!title){ showFeedbackMessage('제목을 입력해주세요.'); return; }
      const finalDate = todoOnly ? '' : date;

        id: window.currentTask&&window.currentTask.id ? window.currentTask.id : Date.now(),
