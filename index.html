<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CLIP Webtoon Viewer</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#111;color:#999;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif}
#toolbar{position:fixed;top:12px;right:12px;z-index:30;display:flex;gap:8px;align-items:flex-start}
button,.fileButton{width:44px;height:44px;border:0;border-radius:999px;background:rgba(35,35,35,.92);color:white;cursor:pointer;display:grid;place-items:center}
button:hover,.fileButton:hover{background:rgba(80,80,80,.96)}
svg{width:22px;height:22px;stroke:currentColor}
#folderInput{display:none}
#message{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.6;padding:40px;color:#777}
#viewer{width:690px;max-width:100vw;margin:0 auto;line-height:0;background:#111}
.page{width:690px;max-width:100vw;height:auto;display:block;margin:0 auto;background:#222}
#status{position:fixed;left:12px;bottom:12px;z-index:30;max-width:calc(100vw - 24px);background:rgba(0,0,0,.78);border:1px solid #333;border-radius:12px;padding:10px 12px;font-size:12px;line-height:1.45;color:#bbb;white-space:pre-wrap}
#modalBackdrop{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:24px}
#mobileModal{width:min(420px,100%);background:#181818;border:1px solid #333;border-radius:18px;padding:22px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.45)}
#mobileModal h2{margin:0 0 10px;color:#eee;font-size:20px}
#mobileModal p{margin:8px 0;color:#aaa;font-size:14px;line-height:1.55}
#qrBox{width:236px;height:236px;margin:18px auto 12px;padding:8px;background:#fff;border-radius:12px;display:grid;place-items:center}
#qrBox:empty::before{content:"QR 준비 중";color:#777;font-size:13px}
#mobileUrl{word-break:break-all;color:#ddd;font-size:12px;background:#111;border:1px solid #333;border-radius:10px;padding:10px;margin-top:10px;line-height:1.4}
.modalActions{display:flex;gap:8px;justify-content:center;margin-top:14px}
.modalActions button{width:auto;height:38px;border-radius:999px;padding:0 16px;font-size:13px}
.viewerMode #toolbar{display:none}
.viewerMode #status{left:50%;transform:translateX(-50%);bottom:12px}
</style>
</head>
<body>

<div id="toolbar">
  <label class="fileButton" title="폴더 열기">
    <input id="folderInput" type="file" webkitdirectory directory multiple />
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 7h7l2 2h9v10H3z"/><path d="M3 7v12"/></svg>
  </label>

  <button id="mobileBtn" title="모바일 연결">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>
  </button>

  <button id="refreshBtn" title="새로고침">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/></svg>
  </button>

  <button id="clearBtn" title="초기화">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
  </button>
</div>

<div id="message">오른쪽 위 폴더 버튼을 눌러<br>CLIP 파일이 들어있는 폴더를 선택하세요</div>
<div id="viewer"></div>
<div id="status">대기 중</div>

<div id="modalBackdrop">
  <div id="mobileModal">
    <h2>모바일에서 보기</h2>
    <p>QR을 휴대폰으로 찍으면 PC에서 보고 있는 원고를 휴대폰 브라우저로 전송합니다.</p>
    <p>연결이 불안정하면 같은 와이파이 또는 핫스팟에서 시도하세요.</p>
    <div id="qrBox"></div>
    <div id="mobileUrl">연결 주소 준비 중...</div>
    <p id="peerState">연결 대기 중...</p>
    <div class="modalActions">
      <button id="sendBtn">다시 전송</button>
      <button id="copyUrlBtn">주소 복사</button>
      <button id="closeModalBtn">닫기</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const folderInput=document.getElementById("folderInput");
const viewer=document.getElementById("viewer");
const message=document.getElementById("message");
const statusBox=document.getElementById("status");
const mobileBtn=document.getElementById("mobileBtn");
const refreshBtn=document.getElementById("refreshBtn");
const clearBtn=document.getElementById("clearBtn");
const modalBackdrop=document.getElementById("modalBackdrop");
const qrBox=document.getElementById("qrBox");
const mobileUrlBox=document.getElementById("mobileUrl");
const peerState=document.getElementById("peerState");
const sendBtn=document.getElementById("sendBtn");

let lastFiles=[];
let SQLPromise=null;
let pageRecords=[];
let hostPeer=null;
let hostId=null;
let hostConnections=[];
let currentSending=false;

const params=new URLSearchParams(location.search);
const joinHostId=params.get("host");
if(joinHostId){
  document.body.classList.add("viewerMode");
  startMobileViewer(joinHostId);
}

function setStatus(t){statusBox.textContent=t}
function setMessage(t){message.style.display="flex";message.innerHTML=t}
function hideMessage(){message.style.display="none"}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

folderInput.addEventListener("change", async e=>{
  lastFiles=Array.from(e.target.files||[]);
  await loadClipFiles(lastFiles);
});

refreshBtn.onclick=async()=>{
  if(!lastFiles.length){setStatus("먼저 폴더를 열어주세요");return}
  await loadClipFiles(lastFiles);
  await broadcastFullAck();
};

clearBtn.onclick=()=>{
  lastFiles=[];
  folderInput.value="";
  clearPages();
  setMessage("오른쪽 위 폴더 버튼을 눌러<br>CLIP 파일이 들어있는 폴더를 선택하세요");
  setStatus("초기화됨");
};

mobileBtn.onclick=async()=>{
  modalBackdrop.style.display="flex";
  await startHostPeer();
};

document.getElementById("closeModalBtn").onclick=()=>modalBackdrop.style.display="none";
document.getElementById("copyUrlBtn").onclick=async()=>{
  const text=mobileUrlBox.textContent.trim();
  if(text) await navigator.clipboard.writeText(text);
  peerState.textContent="주소를 복사했습니다.";
};
sendBtn.onclick=()=>broadcastFullAck();

modalBackdrop.addEventListener("click",e=>{
  if(e.target===modalBackdrop) modalBackdrop.style.display="none";
});

async function getSQL(){
  if(!SQLPromise){
    setStatus("sql.js 불러오는 중...");
    SQLPromise=initSqlJs({locateFile:file=>"https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/"+file});
  }
  return SQLPromise;
}

function naturalSort(a,b){return a.localeCompare(b,undefined,{numeric:true,sensitivity:"base"})}
function getSortName(file){return file.webkitRelativePath||file.name}

function clearPages(){
  viewer.innerHTML="";
  for(const p of pageRecords){if(p.url)URL.revokeObjectURL(p.url)}
  pageRecords=[];
}

async function loadClipFiles(files){
  clearPages();
  setMessage("불러오는 중...");
  setStatus("파일 확인 중...");

  const clipFiles=files.filter(f=>f.name.toLowerCase().endsWith(".clip")).sort((a,b)=>naturalSort(getSortName(a),getSortName(b)));
  if(!clipFiles.length){setMessage(".clip 파일을 찾지 못했습니다");setStatus("실패: .clip 없음");return}

  let SQL;
  try{SQL=await getSQL()}catch(e){setMessage("sql.js를 불러오지 못했습니다.<br>인터넷 연결 상태를 확인해주세요.");setStatus("실패: sql.js 로드 오류");return}

  let success=0, failed=0;
  for(let i=0;i<clipFiles.length;i++){
    const file=clipFiles[i];
    setStatus(`${i+1} / ${clipFiles.length} 불러오는 중\n${file.name}`);
    try{
      const blob=await extractCanvasPreview(file,SQL);
      if(!blob){failed++;continue}
      const url=URL.createObjectURL(blob);
      const img=document.createElement("img");
      img.className="page";
      img.alt=file.name;
      img.src=url;
      viewer.appendChild(img);
      pageRecords.push({name:file.name,type:blob.type,blob,url});
      success++;
      if(success===1)hideMessage();
    }catch(err){console.error(file.name,err);failed++}
    await sleep(0);
  }
  if(success){hideMessage();setStatus(`완료\n표시: ${success}개 / 실패: ${failed}개`)}
  else{setMessage("미리보기 이미지를 찾지 못했습니다");setStatus(`실패: ${failed}개`)}
}

async function extractCanvasPreview(file,SQL){
  const buffer=await file.arrayBuffer();
  const bytes=new Uint8Array(buffer);
  const sqliteOffset=findAscii(bytes,"SQLite format 3");
  if(sqliteOffset<0)return null;
  const db=new SQL.Database(bytes.slice(sqliteOffset));
  let result;
  try{
    result=db.exec(`SELECT ImageData FROM CanvasPreview WHERE ImageData IS NOT NULL ORDER BY ImageWidth * ImageHeight DESC LIMIT 1`);
  }catch(e){db.close();return null}
  if(!result.length||!result[0].values.length){db.close();return null}
  const imageData=result[0].values[0][0];
  db.close();
  if(!imageData)return null;
  const imgBytes=imageData instanceof Uint8Array?imageData:new Uint8Array(imageData);
  const type=detectImageType(imgBytes);
  if(!type)return null;
  return new Blob([imgBytes],{type});
}

function detectImageType(bytes){
  if(bytes[0]===0x89&&bytes[1]===0x50&&bytes[2]===0x4E&&bytes[3]===0x47)return"image/png";
  if(bytes[0]===0xFF&&bytes[1]===0xD8)return"image/jpeg";
  return null;
}

function findAscii(bytes,text){
  const pattern=[...text].map(c=>c.charCodeAt(0));
  outer:for(let i=0;i<=bytes.length-pattern.length;i++){
    for(let j=0;j<pattern.length;j++){if(bytes[i+j]!==pattern[j])continue outer}
    return i;
  }
  return -1;
}

/* WebRTC ACK 방식 */

async function startHostPeer(){
  if(hostPeer&&hostId){showQr();return}
  peerState.textContent="연결 준비 중...";
  qrBox.innerHTML="";
  mobileUrlBox.textContent="연결 주소 준비 중...";

  hostPeer=new Peer(undefined,{
    debug:2,
    config:{
      iceServers:[
        {urls:"stun:stun.l.google.com:19302"},
        {urls:"stun:global.stun.twilio.com:3478"}
      ]
    }
  });

  hostPeer.on("open",id=>{
    hostId=id;
    showQr();
    peerState.textContent="QR을 스캔하면 연결됩니다.";
  });

  hostPeer.on("connection",conn=>{
    hostConnections.push(conn);
    peerState.textContent="휴대폰 연결됨. 전송 준비 중...";
    setStatus("모바일 연결됨");

    conn.on("open",async()=>{
      peerState.textContent="휴대폰 연결됨. 원고 전송 중...";
      await sendFullAck(conn);
      peerState.textContent="휴대폰 연결됨.";
    });

    conn.on("close",()=>{
      hostConnections=hostConnections.filter(c=>c!==conn);
      peerState.textContent="휴대폰 연결이 끊겼습니다.";
    });

    conn.on("error",err=>{
      console.error(err);
      peerState.textContent="연결 오류: "+(err.type||err.message||"unknown");
    });
  });

  hostPeer.on("error",err=>{
    console.error(err);
    peerState.textContent="연결 준비 실패: "+(err.type||err.message||"unknown");
  });
}

function showQr(){
  const base=location.origin+location.pathname;
  const url=base+"?host="+encodeURIComponent(hostId);
  mobileUrlBox.textContent=url;
  qrBox.innerHTML="";
  new QRCode(qrBox,{text:url,width:220,height:220,correctLevel:QRCode.CorrectLevel.M});
}

async function waitForAck(conn,ackType,timeout=20000){
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>{cleanup();reject(new Error("ACK timeout: "+ackType))},timeout);
    function onData(data){
      if(data&&data.type===ackType){cleanup();resolve(data)}
    }
    function cleanup(){
      clearTimeout(timer);
      conn.off("data",onData);
    }
    conn.on("data",onData);
  });
}

async function sendFullAck(conn){
  if(!conn||!conn.open)return;
  conn.send({type:"reset",count:pageRecords.length});
  await waitForAck(conn,"resetAck");

  for(let i=0;i<pageRecords.length;i++){
    const p=pageRecords[i];
    peerState.textContent=`원고 전송 중... ${i+1} / ${pageRecords.length}`;
    setStatus(`모바일 전송 중\n${i+1} / ${pageRecords.length}\n${p.name}`);

    const buffer=await p.blob.arrayBuffer();
    conn.send({
      type:"page",
      index:i,
      total:pageRecords.length,
      name:p.name,
      mime:p.type,
      buffer
    });

    await waitForAck(conn,"pageAck",30000);
    await sleep(80);
  }

  conn.send({type:"done"});
}

async function broadcastFullAck(){
  if(currentSending)return;
  const conns=hostConnections.filter(c=>c.open);
  if(!conns.length)return;
  currentSending=true;
  for(const conn of conns){
    try{await sendFullAck(conn)}
    catch(e){console.error(e);peerState.textContent="전송 오류: "+e.message}
  }
  currentSending=false;
}

/* 모바일 수신 */

function startMobileViewer(targetId){
  clearPages();
  setMessage("PC와 연결 중...");
  setStatus("모바일 뷰어 모드");

  const peer=new Peer(undefined,{
    debug:2,
    config:{
      iceServers:[
        {urls:"stun:stun.l.google.com:19302"},
        {urls:"stun:global.stun.twilio.com:3478"}
      ]
    }
  });

  peer.on("open",()=>{
    const conn=peer.connect(targetId,{reliable:true});

    conn.on("open",()=>{
      setMessage("연결됨<br>PC에서 원고를 전송받는 중...");
      setStatus("PC 연결됨");
    });

    conn.on("data",data=>handleMobileData(conn,data));

    conn.on("close",()=>{
      setStatus("PC 연결 끊김");
      setMessage("PC 연결이 끊겼습니다.");
    });

    conn.on("error",err=>{
      console.error(err);
      setStatus("연결 오류: "+(err.type||err.message||"unknown"));
    });
  });

  peer.on("error",err=>{
    console.error(err);
    setMessage("PC와 연결하지 못했습니다.<br>PC의 QR창을 다시 열고 새 QR로 시도해주세요.");
    setStatus("연결 실패: "+(err.type||err.message||"unknown"));
  });
}

function handleMobileData(conn,data){
  if(data.type==="reset"){
    clearPages();
    setMessage("원고를 받는 중...");
    setStatus(`0 / ${data.count||0} 수신 준비`);
    conn.send({type:"resetAck"});
    return;
  }

  if(data.type==="page"){
    const blob=new Blob([data.buffer],{type:data.mime||"image/png"});
    const url=URL.createObjectURL(blob);
    const img=document.createElement("img");
    img.className="page";
    img.alt=data.name||"";
    img.src=url;
    viewer.appendChild(img);
    pageRecords.push({name:data.name,type:blob.type,blob,url});
    hideMessage();
    setStatus(`${data.index+1} / ${data.total} 수신 완료\n${data.name||""}`);
    conn.send({type:"pageAck",index:data.index});
    return;
  }

  if(data.type==="done"){
    hideMessage();
    setStatus(`완료\n표시: ${pageRecords.length}개`);
  }
}
</script>
</body>
</html>
