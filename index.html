        description, 
        date: finalDate,
        category,
        todoOnly,
        complete: window.currentTask?.complete ?? false 
      };
      const idx=window.customTasks.findIndex(t=>t.id===data.id); if(idx>-1) window.customTasks[idx]=data; else window.customTasks.push(data);
      await window.cloudSaveAll(); closeModal(); renderCalendar();
    };

    // 링크 미리보기 모달
    const openPreviewUploadModal = (bookmark) => {
        currentPreviewEditingBookmark = bookmark;
        if (previewUploadModal) previewUploadModal.style.display = 'flex';
    };
    const closePreviewUploadModal = () => {
        currentPreviewEditingBookmark = null;
        if (previewUploadModal) previewUploadModal.style.display = 'none';
};
    closePreviewUploadBtn?.addEventListener('click', closePreviewUploadModal);
    previewUploadModal?.addEventListener('click', (e)=>{ if(e.target===previewUploadModal) closePreviewUploadModal(); });

    const uploadPreviewFile = async (file) => {
        if (!currentPreviewEditingBookmark) return;
        if (!file) return;
        // 이미지 파일만 허용
        if (!file.type || !file.type.startsWith('image/')) {
            showAlert('이미지 파일만 업로드할 수 있습니다.');
            return;
        }
        try {
            showFeedbackMessage('미리보기 이미지 업로드 중...');
            await window.uploadBookmarkPreviewImage(currentPreviewEditingBookmark.id, file);
            showFeedbackMessage('미리보기 이미지가 저장되었습니다.');
            closePreviewUploadModal();
        } catch (err) {
            console.error(err);
            showAlert('미리보기 이미지 업로드 중 오류가 발생했습니다.');
        }
    };


    // 붙여넣기 처리(모달이 열려 있을 때만)
    document.addEventListener('paste', async (e)=>{
        if(!previewUploadModal || previewUploadModal.style.display !== 'flex') return;
        if(!currentPreviewEditingBookmark) return;
        const items = e.clipboardData?.items;
        if(!items) return;
        const imgItem = [...items].find(it=>it.type && it.type.startsWith('image/'));
        if(!imgItem) return;
        e.preventDefault();
        const blob = imgItem.getAsFile();
        if(!blob) return;
        const fileName = `preview_${currentPreviewEditingBookmark.id}.png`;
        const file = new File([blob], fileName, { type: blob.type || 'image/png' });
        try{
            showFeedbackMessage('미리보기 이미지 업로드 중...');
            await window.uploadBookmarkPreviewImage(currentPreviewEditingBookmark.id, file);
            showFeedbackMessage('미리보기 이미지가 저장되었습니다.');
            closePreviewUploadModal();
        }catch(err){
            console.error(err);
            showAlert('미리보기 이미지 업로드 중 오류가 발생했습니다.');
        }
    });

    (function init(){ 
        attachEventListeners(); 
        renderCalendar(); 
        initWorkMusic();
    })();

    // main.js(모듈)에서도 호출할 수 있도록 노출
    window.renderCalendar = renderCalendar;

    // ===== D&D/붙여넣기/클릭-자동붙여넣기 =====
    function isImageUrl(u){
      try{ new URL(u); }catch{ return false; }
      return /\.(jpe?g|png|gif|webp|svg|avif)(\?|$)/i.test(u);
    }
    
    function isVideoUrl(u){
        if (!u) return false;
        try { new URL(u); } catch { return false; }
        // YouTube, Vimeo, 또는 일반적인 동영상 확장자 검사
        return /youtu\.be|youtube\.com|vimeo\.com|\.(mp4|webm|ogg|mov)(\?|$)|missav\.com/i.test(u);
    }
    
    // 인스타그램 퍼가기 코드 확인 (blockquote 태그를 포함하는지 확인)
    function isInstagramEmbed(text) {
        return /<blockquote class="instagram-media".*<\/blockquote>/.test(text);
    }
    
    // **신규: 도메인 추출 유틸리티**
    function extractDomain(url) {
        if (!url) return 'Unknown';
        try {
            const urlObj = new URL(url.includes('://') ? url : 'https://' + url);
            let domain = urlObj.hostname;
            if (domain.startsWith('www.')) domain = domain.substring(4);
            return domain;
        } catch {
            return 'Unknown';
        }
    }


    // 새로운 유틸리티: 이미지/동영상/인스타그램 URL이 아닌 일반 URL인지 확인
    function isGenericUrl(u) {
        if (!u) return false;
        try {
            const urlObj = new URL(u);
            // http 또는 https 프로토콜을 사용하며, 이미지/비디오/인스타그램 URL이 아닌 경우
            // **수정된 부분: URL에 . (점)이 포함되어야 유효한 도메인으로 간주합니다.**
            return (urlObj.protocol === 'http:' || urlObj.protocol === 'https:') && urlObj.hostname.includes('.') && !isImageUrl(u) && !isVideoUrl(u) && !/instagram\.com/.test(u);
        } catch {
            return false;
        }
    }

    // 클릭: 클립보드 접근 및 자동 붙여넣기 시도
    dragArea.addEventListener('click', async ()=>{
      try{
        let processed = false;
        
        // 1. 클립보드 이미지 처리
        if(navigator.clipboard?.read){
          const items=await navigator.clipboard.read();
          for(const it of items){
            for(const type of it.types){
              if(type.startsWith('image/')){
                const blob=await it.getType(type);
                if(window.addImage){ await window.addImage(new File([blob],'clipboard-image',{type:blob.type}), null); showFeedbackMessage('클립보드 이미지 업로드됨'); processed=true; return; }
              }
            }
          }
        }
        
        // 2. 클립보드 텍스트 (URL/퍼가기 코드) 처리
        const t = await navigator.clipboard.readText();
        if(t){
            if (isInstagramEmbed(t)) {
                if(window.addInstagramBookmark) { await window.addInstagramBookmark(t); showFeedbackMessage('클립보드 인스타그램 게시물 북마크됨'); processed=true; return; }
            } else if(isImageUrl(t)){ 
                if(window.addRemoteImage){ await window.addRemoteImage(t,t); showFeedbackMessage('클립보드 이미지 URL 북마크됨'); processed=true; return; } 
            } else if(isVideoUrl(t)){
                if(window.addVideoBookmark) { await window.addVideoBookmark(t); showFeedbackMessage('클립보드 동영상 URL 북마크됨'); processed=true; return; }
            } else if(isGenericUrl(t)) {
                if(window.addGenericBookmark) { await window.addGenericBookmark(t); showFeedbackMessage('클립보드 페이지 URL 북마크됨'); processed=true; return; }
            }
        }
        
        if(!processed) showAlert('클립보드에서 유효한 콘텐츠를 읽지 못했습니다.');
      }catch(e){ console.error(e); showAlert('클립보드 권한을 허용하세요.'); }
    });

    // 노동요 탭에서 문서 어디에 붙여넣어도 유튜브 링크 추가
    document.addEventListener('paste', async (e)=>{
      const section = document.getElementById('workmusic-section');
      if(!section || !section.classList.contains('active')) return;
      if(previewUploadModal && previewUploadModal.style.display === 'flex') return;
      const text = e.clipboardData?.getData('text/plain') || '';
      if(extractYoutubeVideoId(text)){
        e.preventDefault();
        await addWorkMusicFromText(text);
      }
    });

    // 붙여넣기 핸들러
    dragArea.addEventListener('paste', async (e)=>{
      e.preventDefault();
      const items=[...(e.clipboardData||e.originalEvent?.clipboardData)?.items||[]];
      let foundText = null;

      for(const item of items){
        // 1. 이미지 파일 처리
        if(item.kind==='file' && item.type.startsWith('image/')){
          const file=item.getAsFile(); 
          if(file && window.addImage){ await window.addImage(file,null); showFeedbackMessage('이미지 업로드됨'); return; }
        }
        // 2. 텍스트 처리
        if(item.kind==='string'){
          const txt=await new Promise(r=>item.getAsString(r));
          if(txt){
             if (isInstagramEmbed(txt)) {
                 if(window.addInstagramBookmark) { await window.addInstagramBookmark(txt); showFeedbackMessage('인스타그램 게시물 북마크됨'); return; }
             } else if(isImageUrl(txt)){ 
                if(window.addRemoteImage){ await window.addRemoteImage(txt,txt); showFeedbackMessage('URL 북마크됨'); return; } 
             } else if(isVideoUrl(txt)){
                 if(window.addVideoBookmark) { await window.addVideoBookmark(txt); showFeedbackMessage('동영상 URL 북마크됨'); return; }
             } else if(isGenericUrl(txt)){
                 if(window.addGenericBookmark) { await window.addGenericBookmark(txt); showFeedbackMessage('페이지 URL 북마크됨'); return; }
             }
             foundText = txt;
          }
        }
      }
      
      // Fallback: plain text
      if (!foundText) {
          const plain=e.clipboardData?.getData('text/plain');
          if(plain){
             if (isInstagramEmbed(plain)) {
                 if(window.addInstagramBookmark) { await window.addInstagramBookmark(plain); showFeedbackMessage('인스타그램 게시물 북마크됨'); return; }
             } else if(isImageUrl(plain)){ 
                if(window.addRemoteImage){ await window.addRemoteImage(plain,plain); showFeedbackMessage('URL 북마크됨'); return; } 
             } else if(isVideoUrl(plain)){
                if(window.addVideoBookmark) { await window.addVideoBookmark(plain); showFeedbackMessage('동영상 URL 북마크됨'); return; }
             } else if(isGenericUrl(plain)){
                if(window.addGenericBookmark) { await window.addGenericBookmark(plain); showFeedbackMessage('페이지 URL 북마크됨'); return; }
             }
          }
      }
      
      showAlert('붙여넣기한 항목에 유효한 이미지, 동영상 URL, 일반 페이지 URL 또는 인스타그램 퍼가기 코드가 없습니다.');
    });

</script>

<script type="module">


// ===== Inlined modules: calendar.js / notes.js / bookmarks.js =====

  // no-op (handled in ui.js)

function initNotes(){
  const notesArea = document.getElementById('notesArea');
  const tabsContainer = document.getElementById('notesTabsContainer');
  const addTabBtn = document.getElementById('addNotesTabBtn');
  const downloadNotesBtn = document.getElementById('downloadNotesBtn');
  const toggleEditBtn = document.getElementById('toggleNotesEditBtn');

  if(!tabsContainer || !notesArea) return;

  // Local UI state
  let editMode = false;

  // Helpers
  const genId = ()=> 'tab_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);

  const getState = ()=>({
    tabs: window.__notesTabList || [{ id:'memo', name:'메모', order:0 }],
    notes: window.__notesTabs || {},
    activeId: window.__notesActiveTabId || 'memo'
  });

  const setActive = async (tabId)=>{
    // 1) 현재 탭 내용을 먼저 로컬/클라우드에 확정 저장 (탭 전환 중 유실 방지)
    const prevId = window.__notesActiveTabId || 'memo';
    try{
      if(notesArea){
        window.__notesTabs = window.__notesTabs || {};
        window.__notesTabs[prevId] = notesArea.value ?? '';
        // 디바운스가 남아있더라도 이전 탭은 즉시 저장(최소 1회 보장)
        if(window.cloudSaveNotesFor){
          await window.cloudSaveNotesFor(prevId, window.__notesTabs[prevId]);
        }else if(window.cloudSaveNotes){
          await window.cloudSaveNotes();
        }
      }
    }catch(_){}

    // 2) active tab 변경 + 서버에 activeId 기록
    window.__notesActiveTabId = tabId;
    try{
      window.cloudSetActiveNotesTab && await window.cloudSetActiveNotesTab(tabId);
    }catch(_){}

    // 3) UI 갱신
    render();
    const { notes } = getState();
    notesArea.value = notes[tabId] || '';
  };

  const render = ()=>{
    const { tabs, activeId, notes } = getState();
    // normalize tabs ordering
    const sorted = [...tabs].sort((a,b)=>(a.order??0)-(b.order??0));
    tabsContainer.innerHTML = '';

    sorted.forEach((t)=>{
      const btn = document.createElement('button');
      btn.className = 'notes-tab' + (t.id===activeId ? ' active' : '');
      btn.dataset.tabId = t.id;
      btn.draggable = editMode;
      btn.innerHTML = `
        <span class="tab-label">${escapeHtml(t.name || '')}</span>
        ${editMode ? `<span class="tab-del" title="삭제">×</span>` : ``}
      `;
      tabsContainer.appendChild(btn);
    });

    // Ensure textarea shows active note
    const activeExists = sorted.some(t=>t.id===activeId);
    const useId = activeExists ? activeId : (sorted[0]?.id || 'memo');
    if(useId !== activeId){
      window.__notesActiveTabId = useId;
    }
    notesArea.value = notes[useId] || '';

    // Toggle button icon
    if(toggleEditBtn){
      toggleEditBtn.innerHTML = editMode
        ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>`
        : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`;
    }
  };

  const escapeHtml = (s)=> String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");

  const promptName = (title, current='')=>{
    const name = window.prompt(title, current);
    if(name===null) return null;
    const trimmed = name.trim();
    if(!trimmed) return null;
    return trimmed.slice(0, 20);
  };


  const downloadAllNotes = ()=>{
    // 다운로드는 저장값을 건드리지 않고, 현재 화면의 메모만 로컬 캐시에 반영해서 txt로 내보냅니다.
    const activeId = window.__notesActiveTabId || 'memo';
    window.__notesTabs = window.__notesTabs || {};
    if(notesArea){
      window.__notesTabs[activeId] = notesArea.value ?? '';
    }

    const tabs = [...(window.__notesTabList || [{ id:'memo', name:'메모', order:0 }])]
      .sort((a,b)=>(a.order??0)-(b.order??0));
    const notes = window.__notesTabs || {};
    const now = new Date();
    const pad = (n)=>String(n).padStart(2,'0');
    const dateText = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

    const lines = [];
    lines.push('메모 전체 백업');
    lines.push(`다운로드 시각: ${dateText}`);
    lines.push('');
    lines.push('========================================');
    lines.push('');

    if(!tabs.length){
      lines.push('(메모 탭 없음)');
    }else{
      tabs.forEach((tab, idx)=>{
        const title = tab?.name || `탭 ${idx+1}`;
        const id = tab?.id || '';
        const body = notes[id] ?? '';
        lines.push(`[${idx+1}] ${title}`);
        lines.push('----------------------------------------');
        lines.push(body || '(내용 없음)');
        lines.push('');
        lines.push('========================================');
        lines.push('');
      });
    }

    const blob = new Blob(['\ufeff' + lines.join('\n')], { type:'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `memo_backup_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    if(window.showFeedbackMessage) window.showFeedbackMessage('메모를 txt로 다운로드했습니다.');
  };

  if(downloadNotesBtn){
    downloadNotesBtn.addEventListener('click', downloadAllNotes);
  }

  // Events: select / rename / delete
  tabsContainer.addEventListener('click', async (e)=>{
    const tabBtn = e.target.closest('.notes-tab');
    if(!tabBtn) return;

    // delete in edit mode
    if(editMode && e.target.classList.contains('tab-del')){
      if(!confirm('이 탭과 탭 안의 메모를 삭제할까요?')) return;
      window.cloudDeleteNotesTab && await window.cloudDeleteNotesTab(tabId);
      return;

    // select
    await setActive(tabId);
  });

  tabsContainer.addEventListener('dblclick', async (e)=>{
    const tabBtn = e.target.closest('.notes-tab');
    if(!tabBtn) return;

    const { tabs } = getState();
    const cur = tabs.find(t=>t.id===tabId);
    const newName = promptName('탭 이름 변경', cur?.name || '');
    if(!newName) return;
    window.cloudRenameNotesTab && await window.cloudRenameNotesTab(tabId, newName);
  });

  // Drag reorder (edit mode only) - live reflow + smooth-ish
  let dragFromId = null;
  let draggingEl = null;
  let placeholderEl = null;

  function ensurePlaceholder(width){
    if(placeholderEl) return;
    placeholderEl = document.createElement('div');
    placeholderEl.className = 'notes-tab placeholder';
    placeholderEl.style.width = (width || 80) + 'px';
    placeholderEl.style.height = '32px';
    placeholderEl.style.borderRadius = '10px 10px 0 0';
    placeholderEl.style.border = '1px dashed rgba(255,255,255,.25)';
    placeholderEl.style.background = 'transparent';
  }

  function getDragAfterElement(container, x){
    const els = [...container.querySelectorAll('.notes-tab:not(.dragging):not(.placeholder)')];
    let closest = { offset: Number.NEGATIVE_INFINITY, element: null };
    for(const child of els){
      const box = child.getBoundingClientRect();
      const offset = x - (box.left + box.width/2);
      if(offset < 0 && offset > closest.offset){
        closest = { offset, element: child };
      }
    }
    return closest.element;
  }

  tabsContainer.addEventListener('dragstart', (e)=>{
    if(!editMode) return;
    const tabBtn = e.target.closest('.notes-tab');
    if(!tabBtn) return;
    dragFromId = tabBtn.dataset.tabId;
    draggingEl = tabBtn;
    draggingEl.classList.add('dragging');

    // placeholder for live layout
    const w = tabBtn.getBoundingClientRect().width;
    ensurePlaceholder(w);
    placeholderEl.style.width = w + 'px';
    tabBtn.after(placeholderEl);

    // Better drag image (avoid huge ghost)
    if(e.dataTransfer){
      e.dataTransfer.effectAllowed = 'move';
      try{
        const img = tabBtn.cloneNode(true);
        img.style.position = 'absolute';
        img.style.top = '-9999px';
        img.style.left = '-9999px';
        img.style.opacity = '0.9';
        document.body.appendChild(img);
        e.dataTransfer.setDragImage(img, 10, 10);
        setTimeout(()=>img.remove(), 0);

    }
  });

  tabsContainer.addEventListener('dragover', (e)=>{
    if(!editMode || !draggingEl) return;

  });

  async function finalizeReorder(){
    if(!draggingEl || !placeholderEl) return;
    placeholderEl.replaceWith(draggingEl);
    draggingEl.classList.remove('dragging');

    // compute order from DOM
    const ids = [...tabsContainer.querySelectorAll('.notes-tab')].filter(el=>!el.classList.contains('placeholder')).map(el=>el.dataset.tabId).filter(Boolean);
    const { tabs } = getState();
    const map = new Map(tabs.map(t=>[t.id, t]));
    const next = ids.map((id,i)=>({ ...map.get(id), order: i*10 })).filter(Boolean);
    window.cloudReorderNotesTabs && await window.cloudReorderNotesTabs(next);

    dragFromId = null;
    draggingEl = null;
    placeholderEl = null;

  tabsContainer.addEventListener('drop', async (e)=>{

  if(toggleEditBtn){
    toggleEditBtn.addEventListener('click', ()=>{
      editMode = !editMode;

  // Save note content (tab-safe)
// - 입력 시점의 tabId/value를 캡처하여 저장(탭 전환 중 덮어쓰기/유실 방지)
// - 로컬 캐시(window.__notesTabs)도 즉시 갱신하여 탭 전환 시 내용 유지
if(notesArea){
  const syncLocal = ()=>{
    const tabId = window.__notesActiveTabId || 'memo';
    window.__notesTabs = window.__notesTabs || {};
    window.__notesTabs[tabId] = notesArea.value ?? '';
    return { tabId, value: window.__notesTabs[tabId] };
  };

  notesArea.addEventListener('input', ()=>{

  // 포커스가 빠질 때는 즉시 저장(디바운스 대기 중 유실 방지)

function initBookmarks(){
  const imageGrid=document.getElementById('image-grid');
  const tabsContainer=document.getElementById('bookmarkTabsContainer');
  const addTabBtn=document.getElementById('addBookmarkTabBtn');
  const toggleEditBtn=document.getElementById('toggleBookmarkEditBtn');
  let editMode=false;
  const genId=()=> 'btab_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
  const escapeHtml=(str)=>String(str??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
  const getTabs=()=>{
    const tabs=Array.isArray(window.__bookmarkTabList)&&window.__bookmarkTabList.length ? window.__bookmarkTabList : [{id:'default',name:'기본',order:0}];
    return [...tabs].sort((a,b)=>(a.order??0)-(b.order??0));
  };
  const renderTabs=()=>{
    if(!tabsContainer) return;
    const tabs=getTabs();
    if(!tabs.some(t=>t.id===window.__bookmarkActiveTabId)) window.__bookmarkActiveTabId=tabs[0]?.id||'default';
    tabsContainer.innerHTML='';
    tabs.forEach(t=>{
      const btn=document.createElement('button');
      btn.className='bookmark-tab'+(t.id===window.__bookmarkActiveTabId?' active':'');
      btn.dataset.tabId=t.id;
      btn.draggable=editMode;
      btn.innerHTML=`<span class="tab-label">${escapeHtml(t.name||'탭')}</span>${editMode?`<span class="tab-del" title="삭제">×</span>`:''}`;
      tabsContainer.appendChild(btn);
    });
    if(toggleEditBtn){
      toggleEditBtn.innerHTML= editMode
      ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>`
      : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`;
    }
  };
  const renderAll=()=>{ renderTabs(); if(typeof renderImageBookmarks==='function') renderImageBookmarks(); };
  window.renderBookmarkTabsUI=renderAll;

  tabsContainer?.addEventListener('click', async (e)=>{
    const tabBtn=e.target.closest('.bookmark-tab');
    if(!tabBtn) return;
    const tabId=tabBtn.dataset.tabId;
    if(editMode && e.target.classList.contains('tab-del')){
      if(!confirm('이 탭과 탭 안의 북마크를 삭제할까요?')) return;
      window.cloudDeleteBookmarkTab && await window.cloudDeleteBookmarkTab(tabId);
      return;
    }
    window.__bookmarkActiveTabId=tabId;
    window.cloudSetActiveBookmarkTab && await window.cloudSetActiveBookmarkTab(tabId);
    renderAll();
  });
  tabsContainer?.addEventListener('dblclick', async (e)=>{
    const tabBtn=e.target.closest('.bookmark-tab'); if(!tabBtn) return;
    const tabId=tabBtn.dataset.tabId;
    const cur=getTabs().find(t=>t.id===tabId);
    const name=prompt('탭 이름 변경', cur?.name||'');
    if(name===null) return;
    const trimmed=name.trim().slice(0,20);
    if(trimmed) window.cloudRenameBookmarkTab && await window.cloudRenameBookmarkTab(tabId, trimmed);
  });
  addTabBtn?.addEventListener('click', async ()=>{
    const name=prompt('새 북마크 탭 이름','새 탭');
    if(name===null) return;
    const trimmed=name.trim().slice(0,20);
    if(!trimmed) return;
    const id=genId();
    window.cloudAddBookmarkTab && await window.cloudAddBookmarkTab({id,name:trimmed});
  });
  toggleEditBtn?.addEventListener('click',()=>{ editMode=!editMode; renderTabs(); });

  let draggingEl=null, placeholderEl=null;
  function ensurePlaceholder(width){
    if(placeholderEl) return;
    placeholderEl=document.createElement('div');
    placeholderEl.className='bookmark-tab placeholder';
    placeholderEl.style.width=(width||80)+'px';
    placeholderEl.style.height='32px';
    placeholderEl.style.border='1px dashed rgba(255,255,255,.25)';
    placeholderEl.style.background='transparent';
  }
  function getDragAfterElement(container,x){
    const els=[...container.querySelectorAll('.bookmark-tab:not(.dragging):not(.placeholder)')];
    let closest={offset:Number.NEGATIVE_INFINITY,element:null};
    for(const child of els){
      const box=child.getBoundingClientRect();
      const offset=x-(box.left+box.width/2);
      if(offset<0 && offset>closest.offset) closest={offset,element:child};
    }
    return closest.element;
  }
  tabsContainer?.addEventListener('dragstart',(e)=>{
    if(!editMode) return;
    const tabBtn=e.target.closest('.bookmark-tab'); if(!tabBtn) return;
    draggingEl=tabBtn; draggingEl.classList.add('dragging');
    ensurePlaceholder(tabBtn.getBoundingClientRect().width);
    placeholderEl.style.width=tabBtn.getBoundingClientRect().width+'px';
    tabBtn.after(placeholderEl);
    if(e.dataTransfer) e.dataTransfer.effectAllowed='move';
  });
  tabsContainer?.addEventListener('dragover',(e)=>{
    if(!editMode || !draggingEl) return;
    e.preventDefault();
    const afterEl=getDragAfterElement(tabsContainer,e.clientX);
    if(!afterEl) tabsContainer.appendChild(placeholderEl); else tabsContainer.insertBefore(placeholderEl,afterEl);
  });
  async function finalizeReorder(){
    if(!draggingEl || !placeholderEl) return;
    placeholderEl.replaceWith(draggingEl); draggingEl.classList.remove('dragging');
    const ids=[...tabsContainer.querySelectorAll('.bookmark-tab')].filter(el=>!el.classList.contains('placeholder')).map(el=>el.dataset.tabId).filter(Boolean);
    const map=new Map(getTabs().map(t=>[t.id,t]));
    const next=ids.map((id,i)=>({...map.get(id),order:i*10})).filter(Boolean);
    window.cloudReorderBookmarkTabs && await window.cloudReorderBookmarkTabs(next);
    draggingEl=null; placeholderEl=null;
  }
  tabsContainer?.addEventListener('drop',async(e)=>{ if(!editMode) return; e.preventDefault(); await finalizeReorder(); });
  tabsContainer?.addEventListener('dragend',async()=>{ if(editMode && placeholderEl && draggingEl) await finalizeReorder(); });

  renderAll();
}

    async function driveFetch(url, options={}){
      if(!driveAccessToken) throw new Error('구글 로그인이 필요합니다.');
      const headers=new Headers(options.headers||{});
      headers.set('Authorization','Bearer '+driveAccessToken);

      if(res.status===401){ driveAccessToken=null; throw new Error('Google 인증이 만료되었습니다. 다시 로그인하세요.'); }

    function makeSafeDriveName(name,fallback='untitled'){
      const cleaned=String(name||fallback)

        .trim()
        .slice(0,90);

      if(found) return '.'+found[1].toLowerCase();
      const type=(file && file.type) ? String(file.type) : '';
      if(type.includes('jpeg')||type.includes('jpg')) return '.jpg';
      if(type.includes('webp')) return '.webp';
      if(type.includes('gif')) return '.gif';
      return '.png';
    }

    }
    async function findDriveFile(name,parentId=null,mimeType=null){
      const q=[`name='${qEscape(name)}'`,'trashed=false'];
      if(parentId) q.push(`'${parentId}' in parents`);
      if(mimeType) q.push(`mimeType='${mimeType}'`);
      const url='https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q.join(' and '))+'&fields=files(id,name,mimeType,modifiedTime)&spaces=drive';
      const data=await driveFetch(url).then(r=>r.json());

    async function uploadDriveMultipart({name,blob,parentId,fileId=null,mimeType='application/octet-stream'}){
      const meta={name,mimeType};

      const url=fileId ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&fields=id,name,mimeType,modifiedTime` : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,mimeType,modifiedTime';

    async function saveNotesToDrive(folderId,notesPart){
      notesPart=notesPart||{};
      const tabs=[...(notesPart.notesTabList||[{id:'memo',name:'메모',order:0}])]
        .sort((a,b)=>(Number(a.order||0)-Number(b.order||0)));
      const notes=notesPart.notesTabs||{};
      const expectedNames=new Set();
      const indexTabs=[];
      for(let i=0;i<tabs.length;i++){
        const tab=tabs[i];
        const fileName=getNoteTxtFileName(tab,i);
        expectedNames.add(fileName);
        const textBlob=new Blob([notes[tab.id]||''],{type:'text/plain;charset=utf-8'});
        const existing=await findDriveFile(fileName,folderId,'text/plain');
        const uploaded=await uploadDriveMultipart({name:fileName,blob:textBlob,parentId:folderId,fileId:existing?.id||null,mimeType:'text/plain'});
        indexTabs.push({...tab,noteFileName:fileName,noteFileId:uploaded.id});
      }
      const files=await listDriveFilesInFolder(folderId);
      for(const f of files){
        if(String(f.name||'').toLowerCase().endsWith('.txt') && !expectedNames.has(f.name)){
          await deleteDriveFile(f.id);
        }
      }
      const index={
        version:1,
        updatedAt:notesPart.updatedAt||new Date().toISOString(),
        notesActiveTabId:notesPart.notesActiveTabId||tabs[0]?.id||'memo',
        notesTabList:indexTabs
      };
      await saveJsonToDrive(folderId,DRIVE_NOTES_FILE,index);
      return index;
    }

    async function loadNotesFromDrive(folderId){
      const index=await loadJsonFromDrive(folderId,DRIVE_NOTES_FILE);
      if(index && Array.isArray(index.notesTabList)){
        const notesTabs={};
        const notesTabList=index.notesTabList.map(({noteFileName,noteFileId,...tab})=>tab);
        for(const tab of index.notesTabList){
          try{
            let file=null;
            if(tab.noteFileId) file={id:tab.noteFileId,name:tab.noteFileName};
            if(!file && tab.noteFileName) file=await findDriveFile(tab.noteFileName,folderId,'text/plain');
            notesTabs[tab.id]=file ? await downloadDriveText(file.id) : '';
          }catch(e){
            console.warn('note txt load failed',tab.name,e);
            notesTabs[tab.id]='';
          }
        }
        return {
          notesTabList:notesTabList.length?notesTabList:[{id:'memo',name:'메모',order:0}],
          notesTabs,
          notesActiveTabId:index.notesActiveTabId||notesTabList[0]?.id||'memo',
          updatedAt:index.updatedAt||new Date().toISOString()
        };
      }

      const old=await loadJsonFromDrive(folderId,DRIVE_OLD_NOTES_FILE);
      if(old) return old;

      return null;
    }

    function findAsciiBytes(bytes,text){ const p=[...text].map(c=>c.charCodeAt(0)); outer:for(let i=0;i<=bytes.length-p.length;i++){ for(let j=0;j<p.length;j++){ if(bytes[i+j]!==p[j]) continue outer; } return i; } return -1; }
    function detectImageTypeBytes(bytes){ if(bytes[0]===0x89&&bytes[1]===0x50&&bytes[2]===0x4E&&bytes[3]===0x47) return 'image/png'; if(bytes[0]===0xFF&&bytes[1]===0xD8) return 'image/jpeg'; return null; }
    async function extractClipPreview(file,SQL){
      const buffer=await file.arrayBuffer(); const bytes=new Uint8Array(buffer); const off=findAsciiBytes(bytes,'SQLite format 3'); if(off<0) return null;
      const db=new SQL.Database(bytes.slice(off)); let result;
      try{ result=db.exec('SELECT ImageData FROM CanvasPreview WHERE ImageData IS NOT NULL ORDER BY ImageWidth * ImageHeight DESC LIMIT 1'); }catch(e){ db.close(); return null; }
      if(!result.length||!result[0].values.length){ db.close(); return null; }
      const imageData=result[0].values[0][0]; db.close(); if(!imageData) return null;
      const imgBytes=imageData instanceof Uint8Array?imageData:new Uint8Array(imageData); const type=detectImageTypeBytes(imgBytes); if(!type) return null;
      return new Blob([imgBytes],{type});
    }

      if(!list.length){ showClipMessage('.clip 파일을 찾지 못했습니다.'); setClipStatus('실패: .clip 없음'); return; }
      const SQL=await getClipSQL(); let ok=0,fail=0;
      for(let i=0;i<list.length;i++){
        const file=list[i]; setClipStatus(`${i+1} / ${list.length} 추출 중\n${file.name}`);
        try{ const blob=await extractClipPreview(file,SQL); if(!blob){fail++;continue;} const url=URL.createObjectURL(blob); const img=document.createElement('img'); img.className='clip-page'; img.alt=file.name; img.src=url; clipViewer.appendChild(img); clipLocalPages.push({name:file.name.replace(/\.clip$/i,'.png'),blob,url,type:blob.type}); ok++; if(ok===1) hideClipMessage(); }catch(e){ console.error(e); fail++; }
        await new Promise(r=>setTimeout(r,0));
      }
      if(ok){ hideClipMessage(); setClipStatus(`완료\n표시: ${ok}개 / 실패: ${fail}개`); } else { showClipMessage('미리보기 이미지를 찾지 못했습니다.'); setClipStatus(`실패: ${fail}개`); }
    }
    clipFolderInput?.addEventListener('change',async(e)=>{ clipFiles=Array.from(e.target.files||[]); await loadClipFiles(clipFiles); });
    clipRefreshBtn?.addEventListener('click',async()=>{ if(!clipFiles.length){ setClipStatus('먼저 CLIP 폴더를 열어주세요.'); return; } await loadClipFiles(clipFiles); });
    clipClearBtn?.addEventListener('click',()=>{ clipFiles=[]; if(clipFolderInput) clipFolderInput.value=''; clearClipLocal(); showClipMessage('CLIP 파일이 들어있는 폴더를 선택하세요.'); setClipStatus('초기화됨'); });
    clipUploadDriveBtn?.addEventListener('click',async()=>{
      if(!ensureLogin()) return; if(!clipLocalPages.length){ setClipStatus('먼저 CLIP 폴더를 열어주세요.'); return; }
      const folders=await ensureDriveFolders(); const manifest=[];
      for(let i=0;i<clipLocalPages.length;i++){
        const p=clipLocalPages[i]; setClipStatus(`${i+1} / ${clipLocalPages.length} Drive 업로드 중\n${p.name}`);
        const existing=await findDriveFile(p.name,folders.clipCurrent.id);
        const uploaded=await uploadDriveMultipart({name:p.name,blob:p.blob,parentId:folders.clipCurrent.id,fileId:existing?.id||null,mimeType:p.type||'image/png'});
        manifest.push({index:i,name:p.name,fileId:uploaded.id,mimeType:uploaded.mimeType||p.type||'image/png'});
      }
      currentAppData.state=currentAppData.state||{}; currentAppData.state.clipPages=manifest; await saveAppDataNow(); setClipStatus(`Drive 업로드 완료\n페이지: ${manifest.length}개`); showFeedbackMessage('CLIP 미리보기가 Drive에 저장되었습니다.');
    });
    async function loadClipPagesFromDrive(render=true){
      clearClipLocal(); const pages=(currentAppData.state&&currentAppData.state.clipPages)||[]; if(!pages.length){ if(render) showClipMessage('Drive에 저장된 CLIP 미리보기가 없습니다.'); return; }
      if(render) showClipMessage('Drive에서 CLIP 미리보기를 불러오는 중...');
      for(let i=0;i<pages.length;i++){
        const p=pages[i]; if(render) setClipStatus(`${i+1} / ${pages.length} Drive 다운로드 중\n${p.name}`);
        try{ const blob=await downloadDriveBlob(p.fileId); const url=URL.createObjectURL(blob); const img=document.createElement('img'); img.className='clip-page'; img.alt=p.name; img.src=url; clipViewer.appendChild(img); clipLocalPages.push({name:p.name,blob,url,type:blob.type||p.mimeType}); if(i===0) hideClipMessage(); }catch(e){ console.warn(e); }
      }
      if(render){ hideClipMessage(); setClipStatus(`Drive 불러오기 완료\n표시: ${clipLocalPages.length}개`); }
    }
    clipLoadDriveBtn?.addEventListener('click',async()=>{ if(!ensureLogin()) return; await loadAppDataFromDrive(); renderEverything(); await loadClipPagesFromDrive(true); });

    // 자동 초기 상태
    window.isAuthReady=true;
    setTimeout(async()=>{
      await setupTokenClient();
      if(!driveAccessToken){
        setClipStatus('구글 로그인하면 Drive 데이터를 자동으로 불러옵니다.');
      }
    },500);

    initCalendar();
    initNotes();
    initBookmarks();

</script>

</body>
